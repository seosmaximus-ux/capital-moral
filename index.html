<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Capital Moral</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:black;color:white;text-align:center;font-family:Arial;padding:40px;">

<h1>Capital Moral</h1>

<div id="loginBox">
<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Contraseña"><br><br>
<button id="loginBtn">Entrar</button>
<button id="registerBtn">Registrarse</button>
</div>

<div id="app" style="display:none;">
<h2 id="userEmail"></h2>
<h3>Puntos: <span id="points">0</span></h3>
<button id="addBtn">Sumar 10</button>
<button id="logoutBtn">Cerrar sesión</button>
</div>

<script>

const supabase = window.supabase.createClient(
  "https://mlxcjgywjhtodcjjeiuv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1seGNqZ3l3amh0b2RjamplaXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1Mzk1ODcsImV4cCI6MjA4ODExNTU4N30.fo-7m6lnBSODZYEwVFx0s7lRjNGIxqYmqY5I1Caxkdc"
);

let currentUser = null;

document.getElementById("registerBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({
    email: email,
    password: password
  });

  if(error) alert(error.message);
  else alert("Usuario creado. Ahora podés iniciar sesión.");
});

document.getElementById("loginBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email: email,
    password: password
  });

  if(error) alert(error.message);
  else {
    currentUser = data.user;
    startApp();
  }
});

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await supabase.auth.signOut();
  location.reload();
});

async function startApp(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("userEmail").innerText=currentUser.email;
  await loadData();
}

async function loadData(){
  const { data } = await supabase
  .from("capital")
  .select("*")
  .eq("user_id", currentUser.id)
  .single();

  if(!data){
    await supabase.from("capital").insert({
      user_id: currentUser.id,
      points:0,
      history:[]
    });
    document.getElementById("points").innerText=0;
  } else {
    document.getElementById("points").innerText=data.points;
  }
}

document.getElementById("addBtn").addEventListener("click", async ()=>{
  let current = parseInt(document.getElementById("points").innerText);
  current += 10;

  await supabase.from("capital")
  .update({ points: current })
  .eq("user_id", currentUser.id);

  document.getElementById("points").innerText=current;
});

</script>
</body>
</html>
