<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Capital Moral</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#0f0f10;
color:white;
margin:0;
display:flex;
justify-content:center;
}

.container{
width:420px;
max-width:95%;
padding:20px;
}

h1{
text-align:center;
font-weight:300;
letter-spacing:3px;
margin-bottom:30px;
}

.card{
background:#1a1a1d;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

button{
background:white;
color:black;
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button.secondary{
background:#333;
color:white;
}

input{
width:100%;
padding:10px;
border-radius:6px;
border:none;
margin-top:10px;
}

.profile{
text-align:center;
}

.profile img{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
display:block;
margin:auto;
}

.points{
font-size:28px;
margin-top:10px;
}

.action{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:1px solid #333;
}

.history-item{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #333;
font-size:14px;
}

.small{
font-size:12px;
color:#aaa;
}

</style>
</head>

<body>

<div class="container">

<h1>CAPITAL MORAL</h1>

<div id="auth" class="card">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Contraseña">

<button onclick="login()">Entrar</button>
<button class="secondary" onclick="register()">Registrarse</button>
</div>

<div id="app" style="display:none">

<div class="card profile">

<img id="avatar" src="https://i.imgur.com/2yaf2wb.png">

<input type="file" id="avatarUpload">

<button onclick="uploadAvatar()">Cambiar foto</button>

<div class="points" id="points">0</div>

<button class="secondary" onclick="logout()">Cerrar sesión</button>

</div>


<div class="card">

<h3>Acciones</h3>

<div id="actions"></div>

</div>

<div class="card">

<h3>Historial</h3>

<div id="history"></div>

</div>

</div>

</div>

<script>

const supabase = window.supabase.createClient(
"https://mlxcjgywjhtodcjjeiuv.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1seGNqZ3l3amh0b2RjamplaXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1Mzk1ODcsImV4cCI6MjA4ODExNTU4N30.fo-7m6lnBSODZYEwVFx0s7lRjNGIxqYmqY5I1Caxkdc"
)

let user=null

const actionsList=[
{name:"Entrenar",points:10},
{name:"Leer",points:6},
{name:"Meditar",points:5},
{name:"Estudiar",points:8},
{name:"Dieta perfecta",points:10}
]

function renderActions(){

const container=document.getElementById("actions")

container.innerHTML=""

actionsList.forEach(a=>{

const div=document.createElement("div")

div.className="action"

div.innerHTML=`
<span>${a.name} (+${a.points})</span>
<button onclick="addAction('${a.name}',${a.points})">+</button>
`

container.appendChild(div)

})

}

async function addAction(name,points){

await supabase.from("actions").insert({
user_id:user.id,
name:name,
points:points
})

loadHistory()

}

async function loadHistory(){

const {data}=await supabase
.from("actions")
.select("*")
.eq("user_id",user.id)
.order("created_at",{ascending:false})

let total=0

const history=document.getElementById("history")

history.innerHTML=""

data.forEach(item=>{

total+=item.points

const div=document.createElement("div")

div.className="history-item"

div.innerHTML=`
<span>${item.name}</span>
<span>+${item.points}</span>
`

history.appendChild(div)

})

document.getElementById("points").innerText=total

}

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data,error}=await supabase.auth.signInWithPassword({
email,password
})

if(error){alert(error.message);return}

user=data.user

startApp()

}

async function register(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {error}=await supabase.auth.signUp({
email,password
})

if(error){alert(error.message);return}

alert("Usuario creado")

}

async function logout(){

await supabase.auth.signOut()

location.reload()

}

async function startApp(){

document.getElementById("auth").style.display="none"
document.getElementById("app").style.display="block"

renderActions()

loadHistory()

loadAvatar()

}

async function uploadAvatar(){

const file=document.getElementById("avatarUpload").files[0]

const filePath=user.id+".png"

await supabase.storage
.from("avatars")
.upload(filePath,file,{upsert:true})

loadAvatar()

}

async function loadAvatar(){

const {data}=supabase
.storage
.from("avatars")
.getPublicUrl(user.id+".png")

if(data.publicUrl){
document.getElementById("avatar").src=data.publicUrl+"?t="+Date.now()
}

}

supabase.auth.getSession().then(res=>{
if(res.data.session){
user=res.data.session.user
startApp()
}
})

</script>

</body>
</html>
