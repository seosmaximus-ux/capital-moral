<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Capital Moral</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:black;
color:white;
font-family:Arial;
margin:0;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
border-bottom:1px solid #222;
}

h1{
margin:0;
font-size:22px;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.card{
background:#0f0f0f;
border-radius:12px;
padding:20px;
margin-bottom:20px;
border:1px solid #1f1f1f;
}

.points{
font-size:40px;
font-weight:bold;
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:2px solid #333;
}

.actions{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:20px;
}

button{
background:#1a1a1a;
color:white;
border:none;
padding:12px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#333;
}

.history-item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #222;
}

.ranking-item{
display:flex;
justify-content:space-between;
padding:8px 0;
}

.login{
text-align:center;
margin-top:100px;
}

input{
padding:10px;
border-radius:6px;
border:none;
margin:5px;
}

</style>

</head>

<body>

<header>

<h1>Capital Moral</h1>

<div id="userArea" style="display:none;">
<span id="username"></span>
<button onclick="logout()">Salir</button>
</div>

</header>


<div class="container">

<div id="loginBox" class="login">

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Contraseña">

<br>

<button onclick="login()">Entrar</button>
<button onclick="register()">Registrarse</button>

</div>


<div id="app" style="display:none;">

<div class="card">

<img id="avatar" class="avatar" src="">

<br><br>

<input type="file" id="avatarInput">
<button onclick="uploadAvatar()">Actualizar avatar</button>

<h2 class="points" id="points">0</h2>

</div>


<div class="card">

<div class="actions">

<button onclick="addAction('Ayudé a alguien',10)">🤝 Ayudar +10</button>

<button onclick="addAction('Acto generoso',8)">💝 Generosidad +8</button>

<button onclick="addAction('Mentí',-5)">⚠️ Mentir -5</button>

<button onclick="addAction('Egoísmo',-8)">🧊 Egoísmo -8</button>

</div>

</div>


<div class="card">

<h3>Historial</h3>

<div id="history"></div>

</div>


<div class="card">

<h3>Ranking Global</h3>

<div id="ranking"></div>

</div>

</div>

</div>



<script>

const supabase = window.supabase.createClient(
"https://mlxcjgywjhtodcjjeiuv.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1seGNqZ3l3amh0b2RjamplaXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1Mzk1ODcsImV4cCI6MjA4ODExNTU4N30.fo-7m6lnBSODZYEwVFx0s7lRjNGIxqYmqY5I1Caxkdc"
)

let user=null



async function register(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {error}=await supabase.auth.signUp({
email:email,
password:password
})

if(error) alert(error.message)
else alert("Usuario creado")

}



async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {error}=await supabase.auth.signInWithPassword({
email:email,
password:password
})

if(error) alert(error.message)

}



async function logout(){

await supabase.auth.signOut()
location.reload()

}



supabase.auth.onAuthStateChange((event,session)=>{

if(session){

user=session.user
startApp()

}

})



async function startApp(){

document.getElementById("loginBox").style.display="none"
document.getElementById("app").style.display="block"
document.getElementById("userArea").style.display="block"

document.getElementById("username").innerText=user.email

await loadProfile()
await loadHistory()
await loadRanking()

}



async function loadProfile(){

const {data}=await supabase
.from("profiles")
.select("*")
.eq("id",user.id)
.single()

if(!data){

await supabase.from("profiles").insert({
id:user.id,
points:0
})

document.getElementById("points").innerText=0

}else{

const points=data.points ?? 0

document.getElementById("points").innerText=points

if(data.avatar_url){

document.getElementById("avatar").src=data.avatar_url

}

}

}



async function uploadAvatar(){

const file=document.getElementById("avatarInput").files[0]

if(!file) return

const filePath=user.id+".jpg"

await supabase.storage
.from("avatars")
.upload(filePath,file,{upsert:true})

const url="https://mlxcjgywjhtodcjjeiuv.supabase.co/storage/v1/object/public/avatars/"+filePath+"?t="+Date.now()

await supabase
.from("profiles")
.update({avatar_url:url})
.eq("id",user.id)

document.getElementById("avatar").src=url

}



async function addAction(name,value){

const points=parseInt(document.getElementById("points").innerText)

const newPoints=points+value

await supabase.from("actions").insert({
user_id:user.id,
name:name,
value:value
})

await supabase
.from("profiles")
.update({points:newPoints})
.eq("id",user.id)

document.getElementById("points").innerText=newPoints

loadHistory()
loadRanking()

}



async function loadHistory(){

const {data}=await supabase
.from("actions")
.select("*")
.eq("user_id",user.id)
.order("created_at",{ascending:false})

const history=document.getElementById("history")

history.innerHTML=""

data.forEach(action=>{

const div=document.createElement("div")

div.className="history-item"

div.innerHTML=`
<span>${action.name}</span>
<span>${action.value}</span>
<button onclick="deleteAction('${action.id}',${action.value})">X</button>
`

history.appendChild(div)

})

}



async function deleteAction(id,value){

const points=parseInt(document.getElementById("points").innerText)

const newPoints=points-value

await supabase.from("actions").delete().eq("id",id)

await supabase
.from("profiles")
.update({points:newPoints})
.eq("id",user.id)

document.getElementById("points").innerText=newPoints

loadHistory()
loadRanking()

}



async function loadRanking(){

const {data}=await supabase
.from("profiles")
.select("id,points,avatar_url")
.order("points",{ascending:false})
.limit(10)

const ranking=document.getElementById("ranking")

ranking.innerHTML=""

data.forEach((p,i)=>{

const div=document.createElement("div")

div.className="ranking-item"

div.innerHTML=`
<span>#${i+1}</span>
<span>${p.points ?? 0}</span>
`

ranking.appendChild(div)

})

}



</script>

</body>
</html>
