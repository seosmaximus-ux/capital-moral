<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capital Moral - Edición Oro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --primary: #00ff88; --bg: #0a0a0a; --card: #161616; --text: #f0f0f0; --gold: #ffcc00; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
    .container { max-width: 450px; margin: auto; padding: 20px; }
    .card { background: var(--card); padding: 20px; margin-bottom: 20px; border-radius: 24px; border: 1px solid #222; }
    
    /* MODAL */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 99999; display: flex; align-items: center; justify-content: center; }
    .modal-box { background: #1a1a1a; width: 85%; padding: 25px; border-radius: 24px; border: 2px solid var(--primary); }

    .main-btn { width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 16px; font-weight: 800; cursor: pointer; color: #000; text-transform: uppercase; }
    .btn-edit { background: #333; color: var(--primary); border: 1px solid var(--primary); padding: 10px 15px; border-radius: 12px; cursor: pointer !important; font-weight: bold; font-size: 12px; }

    input, textarea { width: 100%; padding: 15px; border-radius: 14px; background: #000; border: 1px solid #333; color: white; margin-bottom: 15px; box-sizing: border-box; }
    
    /* RANKING CON BRILLO */
    .top-item { display: flex; align-items: center; padding: 15px; border-radius: 15px; margin-bottom: 8px; border: 1px solid #222; position: relative; overflow: hidden; }
    .rank-0 { background: rgba(255, 204, 0, 0.2); border-color: var(--gold); }
    .rank-1 { background: rgba(192, 192, 192, 0.2); border-color: #c0c0c0; }
    .rank-2 { background: rgba(205, 127, 50, 0.2); border-color: #cd7f32; }

    /* Efecto Brillo Oro */
    .rank-0::after {
      content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
      transform: rotate(45deg); animation: shine 3s infinite;
    }
    @keyframes shine { 0% { left: -100%; } 100% { left: 100%; } }

    .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #0a0a0a; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #222; }
    .nav-btn { background: none; border: none; color: #555; font-weight: bold; cursor: pointer; }
    .nav-btn.active { color: var(--primary); }
    .hidden { display: none !important; }
    .img-wall { width: 100%; border-radius: 18px; margin-top: 10px; }
  </style>
</head>
<body>

<div id="editor-container"></div>

<div class="container">
  <h1 style="text-align: center; font-weight: 900;">CAPITAL <span style="color:var(--primary)">MORAL</span></h1>

  <div id="authSection" class="card">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Clave">
    <button class="main-btn" onclick="iniciar()">Entrar</button>
  </div>

  <div id="tab-perfil" class="tab-content hidden">
    <div class="card" style="text-align: center;">
      <h2 id="puntosTotales" style="font-size: 50px; margin: 0;">0</h2>
      <p style="opacity:0.5">Mis Puntos</p>
    </div>
    <div id="miHistorial"></div>
    <button onclick="cerrarSesion()" style="width:100%; background:none; border:none; color:#444; margin-top:20px; cursor:pointer;">Salir</button>
  </div>

  <div id="tab-comunidad" class="tab-content hidden">
    <div id="feedComunidad"></div>
  </div>

  <div id="tab-donar" class="tab-content hidden">
    <div class="card" style="border: 2px solid var(--gold);">
      <h1 id="fondoGlobal" style="text-align: center; font-size: 40px; margin: 10px 0;">$0.00</h1>
      <button class="main-btn" style="background: var(--gold);" onclick="donarManual()">DONAR $10</button>
    </div>
    <div class="card">
      <h4>🏆 Ranking</h4>
      <div id="topDonantes"></div>
    </div>
  </div>
</div>

<nav id="navBar" class="nav-bar hidden">
  <button class="nav-btn active" onclick="verPestana('perfil')">Perfil</button>
  <button class="nav-btn" onclick="verPestana('comunidad')">Muro</button>
  <button class="nav-btn" onclick="verPestana('donar')">Donar</button>
</nav>

<script>
// Limpieza absoluta de variables para evitar SyntaxError
const _sb = supabase.createClient("https://dmlajgddeyfvwahswlvh.supabase.co", "sb_publishable_gsI_j5ddQSWeclCq_RT2cg_nib8UwRX");

function abrirEditor(id, n, c) {
  console.log("Editando:", id);
  const div = document.getElementById('editor-container');
  div.innerHTML = `
    <div class="modal-overlay">
      <div class="modal-box">
        <h3>Editar</h3>
        <input type="text" id="in_n" value="${n}">
        <textarea id="in_c" rows="4">${c}</textarea>
        <button class="main-btn" onclick="guardarCambios(${id})">GUARDAR</button>
        <button onclick="document.getElementById('editor-container').innerHTML=''" style="width:100%; background:none; border:none; color:#666; margin-top:10px; cursor:pointer;">Cerrar</button>
      </div>
    </div>
  `;
}

async function guardarCambios(id) {
  const n = document.getElementById('in_n').value;
  const c = document.getElementById('in_c').value;
  const { error } = await _sb.from('acciones').update({ nombre_ayudado: n, comentario: c }).eq('id', id);
  if(!error) {
    document.getElementById('editor-container').innerHTML = '';
    verPestana('perfil');
  }
}

async function verPestana(name) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
  document.getElementById('tab-' + name).classList.remove('hidden');
  if(name === 'perfil') {
    const { data: { user } } = await _sb.auth.getUser();
    const { data: u } = await _sb.from('usuarios').select('*').eq('id', user.id).single();
    document.getElementById("puntosTotales").innerText = u.capital_total;
    
    const { data: acts } = await _sb.from('acciones').select('*').eq('usuario_id', user.id);
    const h = document.getElementById("miHistorial");
    h.innerHTML = "";
    acts?.forEach(a => {
      h.innerHTML += `<div class="card" style="display:flex; justify-content:space-between">
        <span>${a.nombre_ayudado}</span>
        <button class="btn-edit" onclick="abrirEditor(${a.id}, '${a.nombre_ayudado}', '${a.comentario}')">EDITAR</button>
      </div>`;
    });
  }
  if(name === 'donar') {
    const { data } = await _sb.from('usuarios').select('email, capital_total').order('capital_total', { ascending: false }).limit(5);
    const cont = document.getElementById("topDonantes");
    cont.innerHTML = "";
    const meds = ["🥇", "🥈", "🥉", "🎖️", "🎖️"];
    data?.forEach((u, i) => {
      cont.innerHTML += `<div class="top-item rank-${i}"><span>${meds[i]} ${u.email.split('@')[0]}</span><b style="margin-left:auto">${u.capital_total}</b></div>`;
    });
  }
}

async function iniciar() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const { error } = await _sb.auth.signInWithPassword({ email, password });
  if (error) alert(error.message); else location.reload();
}

async function cerrarSesion() { await _sb.auth.signOut(); location.reload(); }

async function check() {
  const { data: { user } } = await _sb.auth.getUser();
  if (user) {
    document.getElementById("authSection").classList.add("hidden");
    document.getElementById("navBar").classList.remove("hidden");
    verPestana('perfil');
  }
}
check();
</script>
</body>
</html>
