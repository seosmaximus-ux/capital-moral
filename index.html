<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Capital Moral</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:black;
color:white;
font-family:Arial;
margin:0;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
border-bottom:1px solid #222;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.card{
background:#0f0f0f;
border-radius:12px;
padding:20px;
margin-bottom:20px;
border:1px solid #1f1f1f;
}

.points{
font-size:42px;
font-weight:bold;
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:2px solid #333;
}

.actions{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:20px;
}

button{
background:#1a1a1a;
color:white;
border:none;
padding:12px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#333;
}

.history-item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #222;
}

.ranking-item{
display:flex;
justify-content:space-between;
padding:8px 0;
}

.login{
text-align:center;
margin-top:120px;
}

input{
padding:10px;
border-radius:6px;
border:none;
margin:5px;
}

</style>

</head>

<body>

<header>

<h2>Capital Moral</h2>

<div id="userArea" style="display:none">
<span id="username"></span>
<button id="logoutBtn">Salir</button>
</div>

</header>

<div class="container">

<div id="loginBox" class="login">

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Contraseña">

<br>

<button id="loginBtn">Entrar</button>
<button id="registerBtn">Registrarse</button>

</div>


<div id="app" style="display:none">

<div class="card">

<img id="avatar" class="avatar">

<br><br>

<input type="file" id="avatarInput">
<button id="uploadAvatarBtn">Actualizar avatar</button>

<h2 class="points" id="points">0</h2>

</div>


<div class="card">

<div class="actions">

<button data-name="Ayudé a alguien" data-value="10">🤝 Ayudar +10</button>
<button data-name="Acto generoso" data-value="8">💝 Generosidad +8</button>
<button data-name="Mentí" data-value="-5">⚠️ Mentir -5</button>
<button data-name="Egoísmo" data-value="-8">🧊 Egoísmo -8</button>

</div>

</div>


<div class="card">

<h3>Historial</h3>
<div id="history"></div>

</div>


<div class="card">

<h3>Ranking Global</h3>
<div id="ranking"></div>

</div>

</div>

</div>

<script>

const supabaseClient = window.supabase.createClient(
"https://mlxcjgywjhtodcjjeiuv.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1seGNqZ3l3amh0b2RjamplaXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1Mzk1ODcsImV4cCI6MjA4ODExNTU4N30.fo-7m6lnBSODZYEwVFx0s7lRjNGIxqYmqY5I1Caxkdc"
)

let currentUser=null

document.getElementById("loginBtn").addEventListener("click",login)
document.getElementById("registerBtn").addEventListener("click",register)
document.getElementById("logoutBtn").addEventListener("click",logout)
document.getElementById("uploadAvatarBtn").addEventListener("click",uploadAvatar)

document.querySelectorAll(".actions button").forEach(btn=>{
btn.addEventListener("click",()=>{
addAction(btn.dataset.name,parseInt(btn.dataset.value))
})
})

async function register(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {error}=await supabaseClient.auth.signUp({
email,
password
})

if(error) alert(error.message)
else alert("Usuario creado")

}

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {error}=await supabaseClient.auth.signInWithPassword({
email,
password
})

if(error) alert(error.message)

}

async function logout(){

await supabaseClient.auth.signOut()
location.reload()

}

supabaseClient.auth.onAuthStateChange((event,session)=>{

if(session){

currentUser=session.user
startApp()

}

})

async function startApp(){

document.getElementById("loginBox").style.display="none"
document.getElementById("app").style.display="block"
document.getElementById("userArea").style.display="block"

document.getElementById("username").innerText=currentUser.email

await loadProfile()
await loadHistory()
await loadRanking()

}

async function loadProfile(){

const {data}=await supabaseClient
.from("profiles")
.select("*")
.eq("id",currentUser.id)
.single()

if(!data){

await supabaseClient.from("profiles").insert({
id:currentUser.id,
points:0
})

document.getElementById("points").innerText=0

}else{

document.getElementById("points").innerText=data.points ?? 0

if(data.avatar_url){
document.getElementById("avatar").src=data.avatar_url
}

}

}

async function uploadAvatar(){

const file=document.getElementById("avatarInput").files[0]

if(!file) return

const path=currentUser.id+".jpg"

await supabaseClient.storage
.from("avatars")
.upload(path,file,{upsert:true})

const url="https://mlxcjgywjhtodcjjeiuv.supabase.co/storage/v1/object/public/avatars/"+path+"?t="+Date.now()

await supabaseClient
.from("profiles")
.update({avatar_url:url})
.eq("id",currentUser.id)

document.getElementById("avatar").src=url

}

async function addAction(name,value){

const points=parseInt(document.getElementById("points").innerText)

const newPoints=points+value

await supabaseClient.from("actions").insert({
user_id:currentUser.id,
name,
value
})

await supabaseClient
.from("profiles")
.update({points:newPoints})
.eq("id",currentUser.id)

document.getElementById("points").innerText=newPoints

loadHistory()
loadRanking()

}

async function loadHistory(){

const {data}=await supabaseClient
.from("actions")
.select("*")
.eq("user_id",currentUser.id)
.order("created_at",{ascending:false})

const history=document.getElementById("history")

history.innerHTML=""

data.forEach(a=>{

const div=document.createElement("div")

div.className="history-item"

div.innerHTML=`
<span>${a.name}</span>
<span>${a.value}</span>
<button onclick="deleteAction('${a.id}',${a.value})">X</button>
`

history.appendChild(div)

})

}

async function deleteAction(id,value){

const points=parseInt(document.getElementById("points").innerText)

const newPoints=points-value

await supabaseClient.from("actions").delete().eq("id",id)

await supabaseClient
.from("profiles")
.update({points:newPoints})
.eq("id",currentUser.id)

document.getElementById("points").innerText=newPoints

loadHistory()
loadRanking()

}

async function loadRanking(){

const {data}=await supabaseClient
.from("profiles")
.select("points")
.order("points",{ascending:false})
.limit(10)

const ranking=document.getElementById("ranking")

ranking.innerHTML=""

data.forEach((p,i)=>{

const div=document.createElement("div")

div.className="ranking-item"

div.innerHTML=`<span>#${i+1}</span><span>${p.points ?? 0}</span>`

ranking.appendChild(div)

})

}

</script>

</body>
</html>
