<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capital Moral</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --p: #00ff88; --bg: #0a0a0a; --c: #161616; --gold: #ffcc00; }
    body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 80px; }
    .container { max-width: 400px; margin: auto; padding: 20px; }
    .card { background: var(--c); padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #222; position: relative; overflow: hidden; }
    
    /* RANKING CON BRILLO */
    .r-0 { background: rgba(255,204,0,0.15); border: 1px solid var(--gold); }
    .r-0::after { content:""; position:absolute; top:-50%; left:-100%; width:200%; height:200%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transform: rotate(45deg); animation: shine 3s infinite; }
    @keyframes shine { 100% { left: 100%; } }

    .btn { width: 100%; padding: 15px; background: var(--p); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: #000; }
    .btn-edit { background: #333; color: var(--p); border: 1px solid var(--p); padding: 8px; border-radius: 8px; cursor: pointer; font-size: 10px; }
    
    input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
    .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #222; }
    .hidden { display: none !important; }
    .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; display:flex; align-items:center; justify-content:center; }
  </style>
</head>
<body>

<div id="modals"></div>

<div class="container">
  <h2 style="text-align:center">CAPITAL <span style="color:var(--p)">MORAL</span></h2>

  <div id="auth" class="card">
    <input id="em" type="email" placeholder="Email">
    <input id="pw" type="password" placeholder="Password">
    <button class="btn" onclick="login()">ENTRAR</button>
  </div>

  <div id="p-perfil" class="hidden">
    <div class="card" style="text-align:center">
      <h1 id="pts">0</h1>
      <p>Puntos Morales</p>
    </div>
    <div id="lista"></div>
    <button onclick="logout()" style="color:#666; background:none; border:none; width:100%; margin-top:20px;">Cerrar Sesión</button>
  </div>

  <div id="p-donar" class="hidden">
    <div class="card r-0">
      <h3 style="margin:0; color:var(--gold)">🥇 TOP 1 GLOBAL</h3>
      <p id="top1">Cargando...</p>
    </div>
    <div id="ranking"></div>
  </div>
</div>

<div id="menu" class="nav hidden">
  <button onclick="tab('perfil')" style="color:#fff; background:none; border:none;">PERFIL</button>
  <button onclick="tab('donar')" style="color:#fff; background:none; border:none;">RANKING</button>
</div>

<script>
const sb = supabase.createClient("https://dmlajgddeyfvwahswlvh.supabase.co", "sb_publishable_gsI_j5ddQSWeclCq_RT2cg_nib8UwRX");

// EDICIÓN SIN ERRORES
function edit(id, n, c) {
  document.getElementById('modals').innerHTML = `
    <div class="modal">
      <div class="card" style="width:80%">
        <h3>Editar Acción</h3>
        <input id="new-n" value="${n}">
        <textarea id="new-c">${c}</textarea>
        <button class="btn" onclick="save(${id})">GUARDAR</button>
        <button onclick="document.getElementById('modals').innerHTML=''" style="background:none; border:none; color:#fff; width:100%; margin-top:10px;">Cancelar</button>
      </div>
    </div>`;
}

async function save(id) {
  const n = document.getElementById('new-n').value;
  const c = document.getElementById('new-c').value;
  await sb.from('acciones').update({ nombre_ayudado: n, comentario: c }).eq('id', id);
  document.getElementById('modals').innerHTML = '';
  tab('perfil');
}

async function tab(t) {
  document.getElementById('p-perfil').classList.add('hidden');
  document.getElementById('p-donar').classList.add('hidden');
  document.getElementById('p-' + t).classList.remove('hidden');

  if(t === 'perfil') {
    const { data: { user } } = await sb.auth.getUser();
    const { data: u } = await sb.from('usuarios').select('*').eq('id', user.id).single();
    document.getElementById('pts').innerText = u.capital_total || 0;
    
    const { data: acts } = await sb.from('acciones').select('*').eq('usuario_id', user.id);
    const div = document.getElementById('lista');
    div.innerHTML = "<h4>Mis Acciones</h4>";
    acts?.forEach(a => {
      div.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center">
        <span>${a.nombre_ayudado}</span>
        <button class="btn-edit" onclick="edit(${a.id}, '${a.nombre_ayudado}', '${a.comentario}')">EDITAR</button>
      </div>`;
    });
  }

  if(t === 'donar') {
    const { data } = await sb.from('usuarios').select('email, capital_total').order('capital_total', { ascending: false }).limit(5);
    const r = document.getElementById('ranking');
    r.innerHTML = "";
    data?.forEach((u, i) => {
      if(i === 0) document.getElementById('top1').innerText = u.email.split('@')[0] + " con " + u.capital_total + " pts";
      else r.innerHTML += `<div class="card">#${i+1} ${u.email.split('@')[0]} - ${u.capital_total} pts</div>`;
    });
  }
}

async function login() {
  const email = document.getElementById('em').value;
  const password = document.getElementById('pw').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error) alert("Error: " + error.message); else location.reload();
}

async function logout() { await sb.auth.signOut(); location.reload(); }

async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if(user) {
    document.getElementById('auth').classList.add('hidden');
    document.getElementById('menu').classList.remove('hidden');
    tab('perfil');
  }
}
init();
</script>
</body>
</html>
