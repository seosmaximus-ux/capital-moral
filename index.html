<!DOCTYPE html>

<html lang="es">

<head>
<meta charset="UTF-8">
<title>Capital Moral</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:system-ui;
background:#0e0e0e;
color:white;
display:flex;
justify-content:center;
padding:40px;
}

.container{
width:420px;
}

.card{
background:#1a1a1a;
border-radius:20px;
padding:28px;
margin-bottom:24px;
box-shadow:0 10px 40px rgba(0,0,0,.5);
}

h2{
margin-top:0;
font-weight:600;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
background:#333;
margin:auto;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.points{
text-align:center;
font-size:40px;
font-weight:700;
margin-top:10px;
}

.progress{
height:10px;
background:#333;
border-radius:20px;
margin-top:10px;
overflow:hidden;
}

.progress-bar{
height:10px;
background:linear-gradient(90deg,#00ffa6,#00c3ff);
width:0%;
transition:0.4s;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
font-size:15px;
background:#2a2a2a;
color:white;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#3a3a3a;
}

.action{
display:flex;
justify-content:space-between;
margin-top:8px;
}

.action button{
width:auto;
padding:6px 12px;
font-size:13px;
}

.ranking-item{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid #2a2a2a;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-bottom:10px;
background:#2a2a2a;
color:white;
}

</style>

</head>

<body>

<div class="container">

<div class="card" id="loginCard">

<h2>Entrar</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button> <button onclick="signup()">Crear cuenta</button>

</div>

<div id="app" style="display:none">

<div class="card">

<div class="avatar">
<img id="avatarImg">
</div>

<input type="file" onchange="uploadAvatar(event)">

<div class="points" id="points">0</div>

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

</div>

<div class="card">

<h2>Acciones</h2>

<button onclick="addPoints('Entrenamiento',10)">Entrené</button> <button onclick="addPoints('Meditación',5)">Medité</button> <button onclick="addPoints('Lectura',5)">Leí</button> <button onclick="addPoints('Ayudar',8)">Ayudé a alguien</button>

<div id="actionsList"></div>

</div>

<div class="card">

<h2>Ranking</h2>

<div id="ranking"></div>

</div>

</div>

</div>

<script>

const SUPABASE_URL="https://mlxcjgywjhtodcjjeiuv.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1seGNqZ3l3amh0b2RjamplaXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1Mzk1ODcsImV4cCI6MjA4ODExNTU4N30.fo-7m6lnBSODZYEwVFx0s7lRjNGIxqYmqY5I1Caxkdc"

const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let userId=null


async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data,error}=await client.auth.signInWithPassword({email,password})

if(error){
alert(error.message)
return
}

init()

}


async function signup(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data,error}=await client.auth.signUp({email,password})

if(error){
alert(error.message)
return
}

alert("Cuenta creada")

}


async function init(){

const {data:{user}}=await client.auth.getUser()

if(!user)return

userId=user.id

document.getElementById("loginCard").style.display="none"
document.getElementById("app").style.display="block"

loadUser()
loadRanking()
loadActions()

}


async function loadUser(){

const {data}=await client
.from("profiles")
.select("*")
.eq("id",userId)
.single()

if(!data)return

document.getElementById("points").innerText=data.points||0

const percent=(data.points%100)

document.getElementById("bar").style.width=percent+"%"

if(data.avatar_url){

document.getElementById("avatarImg").src=data.avatar_url

}

}


async function uploadAvatar(event){

const file=event.target.files[0]

if(!file)return

const filename=userId+".jpg"

await client.storage
.from("avatars")
.remove([filename])

const {data,error}=await client.storage
.from("avatars")
.upload(filename,file,{upsert:true})

if(error){
alert(error.message)
return
}

const url=`${SUPABASE_URL}/storage/v1/object/public/avatars/${filename}?t=${Date.now()}`

await client
.from("profiles")
.update({avatar_url:url})
.eq("id",userId)

loadUser()

}


async function addPoints(name,value){

await client
.from("actions")
.insert({
user_id:userId,
name:name,
value:value
})

await client.rpc("increment_points",{uid:userId,amount:value})

loadUser()
loadRanking()
loadActions()

}


async function deleteAction(id){

await client
.from("actions")
.delete()
.eq("id",id)

loadActions()

}


async function loadActions(){

const {data}=await client
.from("actions")
.select("*")
.eq("user_id",userId)
.order("created_at",{ascending:false})

const list=document.getElementById("actionsList")

list.innerHTML=""

if(!data)return

data.forEach(a=>{

const div=document.createElement("div")
div.className="action"

div.innerHTML=`
<span>${a.name} (+${a.value})</span>
<button onclick="deleteAction('${a.id}')">X</button>
`

list.appendChild(div)

})

}


async function loadRanking(){

const {data}=await client
.from("profiles")
.select("username,points")
.order("points",{ascending:false})
.limit(10)

const ranking=document.getElementById("ranking")

ranking.innerHTML=""

if(!data)return

data.forEach((p,i)=>{

const div=document.createElement("div")

div.className="ranking-item"

div.innerHTML=`
<span>${i+1}. ${p.username||"Jugador"}</span>
<span>${p.points||0}</span>
`

ranking.appendChild(div)

})

}


init()

</script>

</body>

</html>
