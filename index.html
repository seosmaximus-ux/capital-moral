<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Capital Moral</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#0f0f10;
color:white;
font-family:system-ui;
margin:0;
text-align:center;
}

h1{
font-weight:600;
letter-spacing:2px;
margin-top:30px;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

.card{
background:#18181b;
border-radius:14px;
padding:20px;
margin-top:20px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

button{
background:#26262b;
color:white;
border:none;
padding:12px 18px;
border-radius:10px;
margin:6px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#333;
}

input{
padding:10px;
border-radius:8px;
border:none;
margin:5px;
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:2px solid #333;
margin-bottom:10px;
}

.historyItem{
display:flex;
justify-content:space-between;
padding:8px;
border-bottom:1px solid #2a2a2a;
}

.rankItem{
display:flex;
justify-content:space-between;
padding:6px;
}

</style>

</head>

<body>

<h1>Capital Moral</h1>

<div class="container">

<div id="loginBox" class="card">

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="contraseña">

<br>

<button onclick="register()">Registrarse</button>
<button onclick="login()">Entrar</button>

</div>


<div id="app" style="display:none">

<div class="card">

<h3 id="username"></h3>

<img id="avatar" class="avatar" src="">

<br>

<input type="file" id="avatarInput">
<button onclick="uploadAvatar()">Actualizar avatar</button>

<h2 id="points">0</h2>

<button onclick="logout()">Salir</button>

</div>


<div class="card">

<button onclick="addAction('Ayudé a alguien',10)">🤝 Ayudar +10</button>
<button onclick="addAction('Acto generoso',8)">💝 Generosidad +8</button>
<button onclick="addAction('Mentí',-5)">⚠️ Mentir -5</button>
<button onclick="addAction('Egoísmo',-8)">🧊 Egoísmo -8</button>

</div>


<div class="card">

<h3>Historial</h3>

<div id="history"></div>

</div>


<div class="card">

<h3>Ranking Global</h3>

<div id="ranking"></div>

</div>

</div>

</div>


<script>

const supabaseClient = supabase.createClient(
"https://mlxcjgywjhtodcjjeiuv.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1seGNqZ3l3amh0b2RjamplaXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1Mzk1ODcsImV4cCI6MjA4ODExNTU4N30.fo-7m6lnBSODZYEwVFx0s7lRjNGIxqYmqY5I1Caxkdc"
)

let currentUser=null


async function register(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data,error}=await supabaseClient.auth.signUp({
email,
password
})

if(error) alert(error.message)
else alert("Usuario creado")

}


async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data,error}=await supabaseClient.auth.signInWithPassword({
email,
password
})

if(error) alert(error.message)

}


async function logout(){

await supabaseClient.auth.signOut()
location.reload()

}



supabaseClient.auth.onAuthStateChange((event,session)=>{

if(session){

currentUser=session.user
startApp()

}

})


async function startApp(){

document.getElementById("loginBox").style.display="none"
document.getElementById("app").style.display="block"

document.getElementById("username").innerText=currentUser.email

await ensureProfile()

loadProfile()

loadHistory()

loadRanking()

}



async function ensureProfile(){

const {data}=await supabaseClient
.from("profiles")
.select("*")
.eq("id",currentUser.id)
.single()

if(!data){

await supabaseClient.from("profiles").insert({
id:currentUser.id,
points:0
})

}

}



async function loadProfile(){

const {data}=await supabaseClient
.from("profiles")
.select("*")
.eq("id",currentUser.id)
.single()

document.getElementById("points").innerText=data.points || 0

if(data.avatar_url)
document.getElementById("avatar").src=data.avatar_url

}



async function recalculatePoints(){

const {data}=await supabaseClient
.from("actions")
.select("value")
.eq("user_id",currentUser.id)

let total=0

data.forEach(a=>total+=a.value)

await supabaseClient
.from("profiles")
.update({points:total})
.eq("id",currentUser.id)

document.getElementById("points").innerText=total

}



async function addAction(name,value){

await supabaseClient.from("actions").insert({
user_id:currentUser.id,
name,
value
})

await recalculatePoints()

loadHistory()

loadRanking()

}



async function loadHistory(){

const {data}=await supabaseClient
.from("actions")
.select("*")
.eq("user_id",currentUser.id)
.order("id",{ascending:false})

let html=""

data.forEach(a=>{

html+=`
<div class="historyItem">
${a.name}
<span>${a.value}</span>
<button onclick="deleteAction(${a.id})">X</button>
</div>
`

})

document.getElementById("history").innerHTML=html

}



async function deleteAction(id){

await supabaseClient
.from("actions")
.delete()
.eq("id",id)

await recalculatePoints()

loadHistory()

loadRanking()

}



async function uploadAvatar(){

const file=document.getElementById("avatarInput").files[0]

if(!file) return

const fileName=currentUser.id+".jpg"

await supabaseClient.storage
.from("avatars")
.upload(fileName,file,{upsert:true})

const url=`https://mlxcjgywjhtodcjjeiuv.supabase.co/storage/v1/object/public/avatars/${fileName}?t=${Date.now()}`

await supabaseClient
.from("profiles")
.update({avatar_url:url})
.eq("id",currentUser.id)

document.getElementById("avatar").src=url

}



async function loadRanking(){

const {data}=await supabaseClient
.from("profiles")
.select("*")
.order("points",{ascending:false})
.limit(10)

let html=""

data.forEach((u,i)=>{

html+=`
<div class="rankItem">
#${i+1}
<span>${u.points}</span>
</div>
`

})

document.getElementById("ranking").innerHTML=html

}

</script>

</body>
</html>
