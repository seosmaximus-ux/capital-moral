<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Capital Moral</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

input{
padding:10px;
margin:5px;
border:none;
border-radius:6px;
}

button{
padding:10px 14px;
margin:5px;
border:none;
border-radius:6px;
background:white;
color:black;
cursor:pointer;
}

button:hover{
opacity:0.85;
}

#avatar{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
display:block;
margin:auto;
background:#222;
}

#feed{
max-width:420px;
margin:auto;
margin-top:30px;
text-align:left;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:1px solid #333;
}

.name{
flex:1;
}

.points{
width:60px;
text-align:center;
}

.delete{
background:#ff4444;
color:white;
padding:5px 8px;
}

</style>

</head>

<body>

<h1>Capital Moral</h1>

<div id="loginBox">

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">

<br>

<button onclick="login()">Entrar</button>
<button onclick="register()">Registrarse</button>

</div>

<div id="app" style="display:none">

<img id="avatar">

<h2 id="capital">0</h2>

<br>

<button onclick="addAction('Ayudar a alguien',10)">+ Ayudar</button>
<button onclick="addAction('Mentir',-5)">- Mentir</button>
<button onclick="addAction('Ser generoso',8)">+ Generosidad</button>

<br><br>

<input type="file" id="file">
<button onclick="uploadAvatar()">Subir avatar</button>

<br><br>

<button onclick="logout()">Cerrar sesión</button>

<div id="feed"></div>

</div>

<script>

const supabaseUrl="https://mlxcjgywjhtodcjjeiuv.supabase.co"
const supabaseKey="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1seGNqZ3l3amh0b2RjamplaXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1Mzk1ODcsImV4cCI6MjA4ODExNTU4N30.fo-7m6lnBSODZYEwVFx0s7lRjNGIxqYmqY5I1Caxkdc"

const client=supabase.createClient(supabaseUrl,supabaseKey)

let user=null

async function register(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {error}=await client.auth.signUp({
email,
password
})

if(error) alert(error.message)
else alert("Usuario creado")

}

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data,error}=await client.auth.signInWithPassword({
email,
password
})

if(error){
alert(error.message)
return
}

user=data.user
start()

}

async function logout(){
await client.auth.signOut()
location.reload()
}

async function start(){

document.getElementById("loginBox").style.display="none"
document.getElementById("app").style.display="block"

loadAvatar()
loadActions()

}

async function addAction(name,points){

await client
.from("actions")
.insert({
user_id:user.id,
name:name,
points:points
})

loadActions()

}

async function deleteAction(id){

await client
.from("actions")
.delete()
.eq("id",id)

loadActions()

}

async function loadActions(){

const {data}=await client
.from("actions")
.select("*")
.eq("user_id",user.id)
.order("created_at",{ascending:false})

let total=0

const feed=document.getElementById("feed")
feed.innerHTML=""

data.forEach(a=>{

total+=a.points

const div=document.createElement("div")
div.className="item"

div.innerHTML=`
<div class="name">${a.name}</div>
<div class="points">${a.points>0?"+":""}${a.points}</div>
<button class="delete" onclick="deleteAction('${a.id}')">X</button>
`

feed.appendChild(div)

})

document.getElementById("capital").innerText=total

}

async function uploadAvatar(){

const file=document.getElementById("file").files[0]
if(!file)return

const path=user.id+".png"

await client.storage
.from("avatars")
.upload(path,file,{upsert:true})

const url=supabaseUrl+"/storage/v1/object/public/avatars/"+path+"?t="+Date.now()

await client
.from("profiles")
.upsert({
id:user.id,
avatar_url:url
})

document.getElementById("avatar").src=url

}

async function loadAvatar(){

const {data}=await client
.from("profiles")
.select("avatar_url")
.eq("id",user.id)
.single()

if(data && data.avatar_url){

document.getElementById("avatar").src=data.avatar_url

}

}

client.auth.getSession().then(({data})=>{

if(data.session){

user=data.session.user
start()

}

})

</script>

</body>
</html>
