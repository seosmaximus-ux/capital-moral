<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Capital Moral</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:system-ui;
background:#0f1115;
color:white;
margin:0;
}

.container{
max-width:500px;
margin:auto;
padding:25px;
}

h1{
font-weight:300;
letter-spacing:2px;
text-align:center;
margin-bottom:30px;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:15px;
}

input{
background:#1b1e24;
color:white;
}

button{
background:#2c313a;
color:white;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#3a404b;
}

.hidden{
display:none;
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
display:block;
margin:auto;
margin-bottom:10px;
border:2px solid #2c313a;
}

.action-btn{
margin-top:8px;
}

.feed{
margin-top:25px;
}

.card{
background:#1a1d23;
padding:12px;
border-radius:8px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.small{
font-size:12px;
opacity:0.7;
}

.error{
color:#ff6b6b;
margin-top:10px;
text-align:center;
}

.success{
color:#6bff95;
margin-top:10px;
text-align:center;
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>Capital Moral</h1>

<!-- LOGIN -->

<div id="auth">

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Contraseña">

<button onclick="login()">Entrar</button>
<button onclick="register()">Registrarse</button>

<div id="authMessage"></div>

</div>

<!-- APP -->

<div id="app" class="hidden">

<div class="topbar">
<button onclick="logout()">Cerrar sesión</button>
</div>

<img id="avatar" class="avatar" src="">

<input type="file" id="avatarInput">
<button onclick="uploadAvatar()">Actualizar foto</button>

<h3>Acciones</h3>

<button class="action-btn" onclick="addAction(1)">+1 Buena acción</button>
<button class="action-btn" onclick="addAction(-1)">-1 Mala acción</button>

<div class="feed" id="feed"></div>

</div>

</div>

<script>

const supabaseUrl="https://mlxcjgywjhtodcjjeiuv.supabase.co"
const supabaseKey="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1seGNqZ3l3amh0b2RjamplaXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1Mzk1ODcsImV4cCI6MjA4ODExNTU4N30.fo-7m6lnBSODZYEwVFx0s7lRjNGIxqYmqY5I1Caxkdc"

const supabase=window.supabase.createClient(supabaseUrl,supabaseKey)

let user=null

// detectar sesión al cargar

init()

async function init(){

const {data:{session}}=await supabase.auth.getSession()

if(session){

user=session.user
showApp()
loadAvatar()
loadActions()

}

}

// login

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data,error}=await supabase.auth.signInWithPassword({
email:email,
password:password
})

if(error){

showMessage(error.message,true)
return

}

user=data.user

showApp()

loadAvatar()
loadActions()

}

// registro

async function register(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {error}=await supabase.auth.signUp({
email:email,
password:password
})

if(error){

showMessage(error.message,true)
return

}

showMessage("Usuario creado. Ahora puedes entrar.",false)

}

// logout

async function logout(){

await supabase.auth.signOut()

location.reload()

}

// mostrar app

function showApp(){

document.getElementById("auth").classList.add("hidden")
document.getElementById("app").classList.remove("hidden")

}

// mensajes

function showMessage(msg,error){

const el=document.getElementById("authMessage")

el.innerHTML=msg

el.className=error?"error":"success"

}

// acciones

async function addAction(value){

await supabase.from("actions").insert({
user_id:user.id,
value:value
})

loadActions()

}

// cargar acciones

async function loadActions(){

const {data}=await supabase
.from("actions")
.select("*")
.eq("user_id",user.id)
.order("created_at",{ascending:false})

const feed=document.getElementById("feed")

feed.innerHTML=""

data.forEach(a=>{

const card=document.createElement("div")
card.className="card"

const text=document.createElement("div")

text.innerHTML=(a.value>0?"Buena acción":"Mala acción")+"<div class='small'>"+new Date(a.created_at).toLocaleString()+"</div>"

const buttons=document.createElement("div")

const edit=document.createElement("button")
edit.innerText="Editar"
edit.onclick=()=>editAction(a)

const del=document.createElement("button")
del.innerText="X"
del.onclick=()=>deleteAction(a.id)

buttons.appendChild(edit)
buttons.appendChild(del)

card.appendChild(text)
card.appendChild(buttons)

feed.appendChild(card)

})

}

// editar acción

async function editAction(a){

const v=prompt("Nuevo valor (1 o -1)",a.value)

if(!v)return

await supabase
.from("actions")
.update({value:Number(v)})
.eq("id",a.id)

loadActions()

}

// borrar acción

async function deleteAction(id){

await supabase
.from("actions")
.delete()
.eq("id",id)

loadActions()

}

// avatar

async function uploadAvatar(){

const file=document.getElementById("avatarInput").files[0]

if(!file)return

const filePath=user.id+"_"+Date.now()

await supabase.storage
.from("avatars")
.upload(filePath,file)

const {data}=supabase.storage
.from("avatars")
.getPublicUrl(filePath)

await supabase
.from("profiles")
.upsert({
id:user.id,
avatar_url:data.publicUrl
})

loadAvatar()

}

// cargar avatar

async function loadAvatar(){

const {data}=await supabase
.from("profiles")
.select("avatar_url")
.eq("id",user.id)
.single()

if(data && data.avatar_url){

document.getElementById("avatar").src=data.avatar_url

}

}

</script>

</body>
</html>
