<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Capital Moral</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#0c0c0c;
color:white;
font-family:Arial;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:#171717;
border-radius:14px;
padding:20px;
margin-bottom:20px;
}

button{
background:#00ff88;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

input{
padding:10px;
border-radius:8px;
border:1px solid #333;
background:#000;
color:white;
}

.nav{
position:fixed;
bottom:0;
width:100%;
background:#000;
display:flex;
justify-content:space-around;
padding:15px;
border-top:1px solid #222;
}

.nav button{
background:none;
color:#888;
}

.nav .active{
color:#00ff88;
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:2px solid #00ff88;
}

.hidden{
display:none;
}

.action{
border-bottom:1px solid #222;
padding:10px 0;
display:flex;
justify-content:space-between;
}

</style>
</head>

<body>

<div class="container">

<h1>Capital Moral</h1>

<div id="auth">

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Contraseña">

<button onclick="login()">Entrar</button>
<button onclick="register()">Registrarse</button>

</div>

<div id="app" class="hidden">

<div class="card">

<img id="avatar" class="avatar">

<h3 id="userEmail"></h3>

<input type="file" id="avatarUpload">

<button onclick="uploadAvatar()">Actualizar imagen</button>

<button onclick="logout()">Cerrar sesión</button>

</div>

<div id="perfil" class="card"></div>

<div id="feed" class="card hidden"></div>

<div id="ranking" class="card hidden"></div>

</div>

</div>

<div class="nav hidden" id="menu">

<button onclick="openTab('perfil')" id="btnPerfil">Perfil</button>

<button onclick="openTab('feed')" id="btnFeed">Feed</button>

<button onclick="openTab('ranking')" id="btnRanking">Ranking</button>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://mlxcjgywjhtodcjjeiuv.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1seGNqZ3l3amh0b2RjamplaXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1Mzk1ODcsImV4cCI6MjA4ODExNTU4N30.fo-7m6lnBSODZYEwVFx0s7lRjNGIxqYmqY5I1Caxkdc"
)

let user

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data,error}=await supabaseClient.auth.signInWithPassword({
email,password
})

if(error) alert(error.message)

}

async function register(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data,error}=await supabaseClient.auth.signUp({
email,password
})

if(error) alert(error.message)

}

async function logout(){

await supabaseClient.auth.signOut()
location.reload()

}

supabaseClient.auth.onAuthStateChange((event,session)=>{

if(session){

user=session.user
startApp()

}

})

async function startApp(){

document.getElementById("auth").style.display="none"
document.getElementById("app").classList.remove("hidden")
document.getElementById("menu").classList.remove("hidden")

document.getElementById("userEmail").innerText=user.email

loadProfile()
loadHistory()

let tab=localStorage.getItem("tab")||"perfil"
openTab(tab)

}

function openTab(tab){

localStorage.setItem("tab",tab)

document.getElementById("perfil").classList.add("hidden")
document.getElementById("feed").classList.add("hidden")
document.getElementById("ranking").classList.add("hidden")

document.getElementById(tab).classList.remove("hidden")

}

async function loadProfile(){

const {data}=await supabaseClient
.from("usuarios")
.select("*")
.eq("id",user.id)
.single()

if(data?.avatar_url){

document.getElementById("avatar").src=data.avatar_url

}

}

async function uploadAvatar(){

const file=document.getElementById("avatarUpload").files[0]

if(!file)return

const path=user.id+".jpg"

await supabaseClient.storage
.from("avatars")
.upload(path,file,{upsert:true})

const {data}=supabaseClient
.storage
.from("avatars")
.getPublicUrl(path)

await supabaseClient
.from("usuarios")
.update({avatar_url:data.publicUrl})
.eq("id",user.id)

document.getElementById("avatar").src=data.publicUrl

alert("Imagen actualizada correctamente")

}

async function loadHistory(){

const {data}=await supabaseClient
.from("acciones")
.select("*")
.eq("usuario_id",user.id)
.order("created_at",{ascending:false})

let html="<h3>Historial</h3>"

data?.forEach(a=>{

html+=`
<div class="action">
<span>${a.descripcion}</span>
<span>+${a.puntos}</span>
</div>
`

})

document.getElementById("perfil").innerHTML=html

}

</script>

</body>
</html>
