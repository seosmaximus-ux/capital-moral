<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Capital Moral</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#0b0b0b;
color:white;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
margin:0;
}

.container{
max-width:540px;
margin:auto;
padding:30px 20px;
}

h1{
font-size:28px;
font-weight:600;
letter-spacing:1px;
margin-bottom:25px;
}

.card{
background:#151515;
border-radius:16px;
padding:22px;
margin-bottom:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#1f1f1f;
color:white;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:white;
color:black;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
font-size:14px;
opacity:0.8;
}

.logout{
background:#2b2b2b;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
}

.avatar{
width:110px;
height:110px;
border-radius:50%;
overflow:hidden;
margin:auto;
background:#222;
display:flex;
align-items:center;
justify-content:center;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.points{
font-size:46px;
font-weight:700;
text-align:center;
margin:10px 0;
}

.level{
text-align:center;
font-size:14px;
opacity:0.7;
}

.progress{
width:100%;
height:8px;
background:#222;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:100%;
width:0%;
background:#3cff8a;
transition:width .4s;
}

.actions{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.actions button{
background:#222;
color:white;
}

.feed .item{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 0;
border-bottom:1px solid #222;
font-size:14px;
}

.value{
width:60px;
text-align:center;
font-weight:600;
}

.pos{color:#3cff8a;}
.neg{color:#ff5b5b;}

.delete{
background:#333;
padding:4px 7px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

.rankItem{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #222;
font-size:14px;
}

.badge{
background:#222;
padding:6px 10px;
border-radius:20px;
font-size:12px;
display:inline-block;
margin:4px;
}

</style>

</head>

<body>

<div class="container">

<h1>Capital Moral</h1>

<div id="loginBox" class="card">

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">

<button onclick="login()">Entrar</button>
<button onclick="register()">Registrarse</button>

</div>

<div id="app" style="display:none">

<div class="card">

<div class="topbar">
<div id="userEmail"></div>
<div class="logout" onclick="logout()">Salir</div>
</div>

<div class="avatar">
<img id="avatarImg">
</div>

<div class="points" id="capital">0</div>

<div class="level" id="levelName"></div>

<div class="progress">
<div class="bar" id="progressBar"></div>
</div>

<input type="file" id="file">
<button onclick="uploadAvatar()">Actualizar avatar</button>

</div>

<div class="card">

<div class="actions">

<button onclick="addAction('Ayudé a alguien',10)">🤝 Ayudar</button>
<button onclick="addAction('Acto generoso',8)">💝 Generosidad</button>
<button onclick="addAction('Mentí',-5)">⚠️ Mentir</button>
<button onclick="addAction('Acto egoísta',-8)">🧊 Egoísmo</button>

</div>

</div>

<div class="card">
<h3>Historial</h3>
<div id="feed" class="feed"></div>
</div>

<div class="card">
<h3>Logros</h3>
<div id="achievements"></div>
</div>

<div class="card">
<h3>Ranking Global</h3>
<div id="ranking"></div>
</div>

</div>

</div>

<script>

const supabaseUrl="https://mlxcjgywjhtodcjjeiuv.supabase.co"
const supabaseKey="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1seGNqZ3l3amh0b2RjamplaXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1Mzk1ODcsImV4cCI6MjA4ODExNTU4N30.fo-7m6lnBSODZYEwVFx0s7lRjNGIxqYmqY5I1Caxkdc"

const client=supabase.createClient(supabaseUrl,supabaseKey)

let user=null

const levels=[
{points:0,name:"Iniciado"},
{points:100,name:"Honorable"},
{points:300,name:"Virtuoso"},
{points:700,name:"Sabio"},
{points:1500,name:"Maestro Moral"}
]

async function register(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {error}=await client.auth.signUp({email,password})

if(error) alert(error.message)
else alert("Usuario creado")

}

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data,error}=await client.auth.signInWithPassword({email,password})

if(error){alert(error.message);return}

user=data.user
start()

}

async function logout(){
await client.auth.signOut()
location.reload()
}

async function start(){

document.getElementById("loginBox").style.display="none"
document.getElementById("app").style.display="block"

document.getElementById("userEmail").innerText=user.email

loadAvatar()
loadActions()
loadRanking()
loadAchievements()

}

async function addAction(name,points){

await client
.from("actions")
.insert({user_id:user.id,name,points})

loadActions()

}

async function deleteAction(id){

await client
.from("actions")
.delete()
.eq("id",id)

loadActions()

}

function calculateLevel(total){

let level=levels[0]

for(let i=0;i<levels.length;i++){
if(total>=levels[i].points) level=levels[i]
}

let next=levels.find(l=>l.points>level.points)

let progress=0

if(next){
progress=((total-level.points)/(next.points-level.points))*100
}else{
progress=100
}

document.getElementById("levelName").innerText=level.name
document.getElementById("progressBar").style.width=progress+"%"

}

async function loadActions(){

const {data}=await client
.from("actions")
.select("*")
.eq("user_id",user.id)
.order("created_at",{ascending:false})

let total=0

const feed=document.getElementById("feed")
feed.innerHTML=""

data.forEach(a=>{

total+=a.points

const div=document.createElement("div")
div.className="item"

div.innerHTML=`
<div>${a.name}</div>
<div class="value ${a.points>0?'pos':'neg'}">${a.points>0?'+':''}${a.points}</div>
<div class="delete" onclick="deleteAction('${a.id}')">X</div>
`

feed.appendChild(div)

})

document.getElementById("capital").innerText=total

calculateLevel(total)

checkAchievements(total)

}

async function checkAchievements(points){

if(points>=100) unlock("Primer Nivel")
if(points>=300) unlock("Virtuoso")
if(points>=700) unlock("Sabio")
if(points>=1500) unlock("Maestro Moral")

}

async function unlock(name){

const {data}=await client
.from("achievements")
.select("*")
.eq("user_id",user.id)
.eq("name",name)

if(data.length===0){

await client
.from("achievements")
.insert({user_id:user.id,name})

loadAchievements()

}

}

async function loadAchievements(){

const {data}=await client
.from("achievements")
.select("*")
.eq("user_id",user.id)

const box=document.getElementById("achievements")

box.innerHTML=""

data.forEach(a=>{
box.innerHTML+=`<div class="badge">${a.name}</div>`
})

}

async function loadRanking(){

const {data}=await client
.from("actions")
.select("user_id,points")

let totals={}

data.forEach(a=>{
totals[a.user_id]=(totals[a.user_id]||0)+a.points
})

const arr=Object.entries(totals)
.sort((a,b)=>b[1]-a[1])
.slice(0,10)

const box=document.getElementById("ranking")
box.innerHTML=""

arr.forEach((r,i)=>{

box.innerHTML+=`
<div class="rankItem">
<div>#${i+1}</div>
<div>${r[0].slice(0,6)}</div>
<div>${r[1]}</div>
</div>
`

})

}

async function uploadAvatar(){

const file=document.getElementById("file").files[0]
if(!file)return

const path=user.id+".jpg"

await client.storage
.from("avatars")
.upload(path,file,{upsert:true})

const {data}=client.storage
.from("avatars")
.getPublicUrl(path)

const url=data.publicUrl+"?t="+Date.now()

await client
.from("profiles")
.upsert({id:user.id,avatar_url:url})

document.getElementById("avatarImg").src=url

}

async function loadAvatar(){

const {data}=await client
.from("profiles")
.select("avatar_url")
.eq("id",user.id)
.single()

if(data && data.avatar_url){
document.getElementById("avatarImg").src=data.avatar_url
}

}

client.auth.getSession().then(({data})=>{
if(data.session){
user=data.session.user
start()
}
})

</script>

</body>

</html>
