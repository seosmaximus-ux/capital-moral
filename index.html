<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capital Moral Premium</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root { --p:#00ff88; --bg:#0a0a0a; --c:#161616; --gold:#ffcc00; }
body { font-family:sans-serif; background:var(--bg); color:#eee; margin:0; padding-bottom:100px; }
.container { max-width:450px; margin:auto; padding:20px; }
.card { background:var(--c); padding:20px; border-radius:20px; margin-bottom:20px; border:1px solid #222; position:relative; overflow:hidden; }
.btn-main { width:100%; padding:15px; background:var(--p); border:none; border-radius:12px; font-weight:800; cursor:pointer; color:#000; }
.btn-edit { background:#222; color:var(--p); border:1px solid var(--p); padding:6px 12px; border-radius:8px; cursor:pointer; font-size:11px; }
input, textarea { width:100%; padding:12px; border-radius:10px; background:#000; border:1px solid #333; color:#fff; margin-bottom:10px; box-sizing:border-box; }
.rank-gold { border:1px solid var(--gold); background:linear-gradient(135deg, rgba(255,204,0,0.1), #161616); }
.rank-gold::after { content:""; position:absolute; top:-50%; left:-100%; width:200%; height:200%; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent); transform:rotate(45deg); animation:sh 4s infinite; }
@keyframes sh { 100% { left:100%; } }
.nav { position:fixed; bottom:0; width:100%; background:rgba(0,0,0,0.9); display:flex; justify-content:space-around; padding:15px; border-top:1px solid #222; }
.nav button { background:none; border:none; color:#666; font-weight:bold; cursor:pointer; }
.nav .active { color:var(--p); }
.modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; display:flex; align-items:center; justify-content:center; }
.hidden { display:none !important; }
.img-w { width:100%; border-radius:12px; margin-top:10px; }
</style>
</head>
<body>

<div id="m-layer"></div>

<div class="container">
<h2 style="text-align:center">CAPITAL <span style="color:var(--p)">MORAL</span></h2>

<div id="auth-ui" class="card">
<input type="email" id="email" placeholder="Email">
<input type="password" id="pass" placeholder="Contraseña">
<button class="btn-main" onclick="acc('login')">ENTRAR</button>
</div>

<div id="t-perfil" class="hidden">
<div class="card" style="text-align:center">
<h1 id="u-pts">0</h1>
<p style="opacity:0.5">Mis Puntos</p>
</div>
<div class="card">
<input id="a-n" placeholder="¿A quién ayudaste?">
<textarea id="a-d" placeholder="Descripción..."></textarea>
<input type="file" id="a-f" accept="image/*">
<button class="btn-main" onclick="subir()">PUBLICAR</button>
</div>
<div id="hist"></div>
<button onclick="acc('logout')" style="width:100%; background:none; border:none; color:#444; margin-top:10px;">Salir</button>
</div>

<div id="t-muro" class="hidden">
<div id="feed"></div>
</div>

<div id="t-donar" class="hidden">
<div class="card rank-gold" style="text-align:center">
<h4 style="color:var(--gold)">FONDO GLOBAL</h4>
<h1 id="f-tot">$0.00</h1>
<input type="number" id="d-amt" placeholder="Monto $">
<button class="btn-main" style="background:var(--gold)" onclick="donar()">DONAR</button>
</div>
<div id="ranking"></div>
</div>
</div>

<div id="menu" class="nav hidden">
<button onclick="tab('perfil')" id="b-perfil">PERFIL</button>
<button onclick="tab('muro')" id="b-muro">MURO</button>
<button onclick="tab('donar')" id="b-donar">DONAR</button>
</div>

<script>
const _s = supabase.createClient("https://dmlajgddeyfvwahswlvh.supabase.co", "sb_publishable_gsI_j5ddQSWeclCq_RT2cg_nib8UwRX");

function abrirE(id, n, c) {
const l = document.getElementById('m-layer');
l.innerHTML = `<div class="modal"><div class="card" style="width:80%"><h3>Editar</h3><input id="e-n" value="${n}"><textarea id="e-c">${c}</textarea><button class="btn-main" onclick="guardarE(${id})">GUARDAR</button><button onclick="document.getElementById('m-layer').innerHTML=''" style="width:100%; background:none; border:none; color:#fff; margin-top:10px;">Cerrar</button></div></div>`;
}

async function guardarE(id) {
const n = document.getElementById('e-n').value;
const c = document.getElementById('e-c').value;
await _s.from('acciones').update({ nombre_ayudado:n, comentario:c }).eq('id', id);
document.getElementById('m-layer').innerHTML = '';
tab('perfil');
}

async function tab(t) {
document.querySelectorAll('.tab-content, .nav button').forEach(el=>el.classList.remove('active', 'hidden'));
document.getElementById('t-perfil').classList.add('hidden');
document.getElementById('t-muro').classList.add('hidden');
document.getElementById('t-donar').classList.add('hidden');
document.getElementById('t-'+t).classList.remove('hidden');
document.getElementById('b-'+t).classList.add('active');

if(t==='perfil') {
const {data:{user}} = await _s.auth.getUser();
const {data:u} = await _s.from('usuarios').select('*').eq('id', user.id).single();
document.getElementById('u-pts').innerText = u.capital_total || 0;
const {data:as} = await _s.from('acciones').select('*').eq('usuario_id', user.id).order('created_at',{ascending:false});
const h = document.getElementById('hist');
h.innerHTML = "<h4>Mis Acciones</h4>";
as?.forEach(x=>{
h.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center"><span>${x.nombre_ayudado}</span><button class="btn-edit" onclick="abrirE(${x.id},'${x.nombre_ayudado}','${x.comentario}')">EDITAR</button></div>`;
});
}

if(t==='muro') {
const f = document.getElementById('feed'); f.innerHTML = "";
const {data:as} = await _s.from('acciones').select('*').order('created_at',{ascending:false});
const {data:vs} = await _s.from('validaciones').select('*');
as?.forEach(x=>{
const nv = vs?.filter(v=>v.accion_id==x.id).length || 0;
f.innerHTML += `<div class="card"><p><b>${x.nombre_ayudado}</b>: ${x.comentario}</p><img src="${x.foto_url}" class="img-w"><div style="display:flex; justify-content:space-between; margin-top:10px"><small>${nv}/3 Votos</small><button class="btn-edit" onclick="votar(${x.id})">VALIDAR</button></div></div>`;
});
}

if(t==='donar') {
const {data:f} = await _s.from('fondo_comunitario').select('*').eq('id',1).single();
document.getElementById('f-tot').innerText = "$"+(f?.monto_total||0);
const {data:us} = await _s.from('usuarios').select('email, capital_total').order('capital_total',{ascending:false}).limit(5);
const r = document.getElementById('ranking'); r.innerHTML = "<h4>Ranking</h4>";
const ms = ["🥇","🥈","🥉","🎖️","🎖️"];
us?.forEach((u,i)=>{
r.innerHTML += `<div class="card" style="display:flex; justify-content:space-between"><span>${ms[i]} ${u.email.split('@')[0]}</span><b>${u.capital_total}</b></div>`;
});
}
}

async function votar(id) {
const {data:{user}} = await _s.auth.getUser();
await _s.from('validaciones').insert([{accion_id:id, usuario_id:user.id}]);
tab('muro');
}

async function donar() {
const a = parseFloat(document.getElementById('d-amt').value);
if(!a) return;
const {data:f} = await _s.from('fondo_comunitario').select('*').eq('id',1).single();
await _s.from('fondo_comunitario').update({monto_total:(f.monto_total||0)+a}).eq('id',1);
tab('donar');
}

async function subir() {
const n = document.getElementById('a-n').value;
const c = document.getElementById('a-d').value;
const f = document.getElementById('a-f').files[0];
if(!n || !f) return alert("Falta info");
const {data:{user}} = await _s.auth.getUser();
const p = `p/${user.id}_${Date.now()}.jpg`;
await _s.storage.from('pruebas').upload(p, f);
const {data:{publicUrl}} = _s.storage.from('pruebas').getPublicUrl(p);
await _s.from('acciones').insert([{usuario_id:user.id, nombre_ayudado:n, comentario:c, foto_url:publicUrl, puntos:50}]);
tab('perfil');
}

async function acc(type) {
if(type==='login') {
const {error} = await _s.auth.signInWithPassword({email:document.getElementById('email').value, password:document.getElementById('pass').value});
if(error) alert(error.message); else location.reload();
} else { await _s.auth.signOut(); location.reload(); }
}

async function init() {
const {data:{user}} = await _s.auth.getUser();
if(user) {
document.getElementById('auth-ui').classList.add('hidden');
document.getElementById('menu').classList.remove('hidden');
tab('perfil');
}
}
init();
</script>
</body>
</html>
