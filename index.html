<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Capital Moral</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#0a0a0a;
color:white;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
margin:0;
}

.container{
max-width:500px;
margin:auto;
padding:30px;
}

h1{
font-weight:600;
letter-spacing:1px;
}

.card{
background:#141414;
padding:25px;
border-radius:14px;
margin-top:20px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#1f1f1f;
color:white;
}

button{
margin-top:10px;
padding:12px;
border:none;
border-radius:8px;
background:white;
color:black;
font-weight:600;
cursor:pointer;
width:100%;
}

button:hover{
opacity:0.9;
}

.avatar{
width:110px;
height:110px;
border-radius:50%;
overflow:hidden;
margin:auto;
margin-bottom:15px;
background:#222;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.points{
font-size:40px;
font-weight:700;
margin-bottom:20px;
}

.actions button{
width:48%;
margin:1%;
}

.feed{
margin-top:20px;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
border-bottom:1px solid #222;
}

.name{
flex:1;
}

.value{
width:60px;
text-align:center;
font-weight:600;
}

.delete{
background:#ff4444;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.logout{
background:#333;
color:white;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>Capital Moral</h1>

<div id="loginBox" class="card">

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">

<button onclick="login()">Entrar</button>
<button onclick="register()">Registrarse</button>

</div>

<div id="app" style="display:none">

<div class="card">

<div class="topbar">
<div id="userEmail"></div>
<div class="logout" onclick="logout()">Salir</div>
</div>

<div class="avatar">
<img id="avatarImg">
</div>

<div class="points" id="capital">0</div>

<input type="file" id="file">
<button onclick="uploadAvatar()">Subir avatar</button>

</div>

<div class="card actions">

<button onclick="addAction('Ayudar a alguien',10)">+ Ayudar</button>
<button onclick="addAction('Generosidad',8)">+ Generosidad</button>
<button onclick="addAction('Mentir',-5)">- Mentir</button>
<button onclick="addAction('Ser egoísta',-8)">- Egoísmo</button>

</div>

<div class="card feed" id="feed"></div>

</div>

</div>

<script>

const supabaseUrl="https://mlxcjgywjhtodcjjeiuv.supabase.co"
const supabaseKey="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1seGNqZ3l3amh0b2RjamplaXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1Mzk1ODcsImV4cCI6MjA4ODExNTU4N30.fo-7m6lnBSODZYEwVFx0s7lRjNGIxqYmqY5I1Caxkdc"

const client=supabase.createClient(supabaseUrl,supabaseKey)

let user=null

async function register(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {error}=await client.auth.signUp({email,password})

if(error) alert(error.message)
else alert("Usuario creado")

}

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data,error}=await client.auth.signInWithPassword({email,password})

if(error){alert(error.message);return}

user=data.user
start()

}

async function logout(){
await client.auth.signOut()
location.reload()
}

async function start(){

document.getElementById("loginBox").style.display="none"
document.getElementById("app").style.display="block"

document.getElementById("userEmail").innerText=user.email

loadAvatar()
loadActions()

}

async function addAction(name,points){

await client
.from("actions")
.insert({user_id:user.id,name,points})

loadActions()

}

async function deleteAction(id){

await client
.from("actions")
.delete()
.eq("id",id)

loadActions()

}

async function loadActions(){

const {data}=await client
.from("actions")
.select("*")
.eq("user_id",user.id)
.order("created_at",{ascending:false})

let total=0

const feed=document.getElementById("feed")
feed.innerHTML=""

data.forEach(a=>{

total+=a.points

const div=document.createElement("div")
div.className="item"

div.innerHTML=`
<div class="name">${a.name}</div>
<div class="value">${a.points>0?"+":""}${a.points}</div>
<div class="delete" onclick="deleteAction('${a.id}')">X</div>
`

feed.appendChild(div)

})

document.getElementById("capital").innerText=total

}

async function uploadAvatar(){

const file=document.getElementById("file").files[0]
if(!file)return

const path=user.id+".jpg"

await client.storage
.from("avatars")
.upload(path,file,{upsert:true})

const {data}=client.storage
.from("avatars")
.getPublicUrl(path)

const url=data.publicUrl+"?t="+Date.now()

await client
.from("profiles")
.upsert({id:user.id,avatar_url:url})

document.getElementById("avatarImg").src=url

}

async function loadAvatar(){

const {data}=await client
.from("profiles")
.select("avatar_url")
.eq("id",user.id)
.single()

if(data && data.avatar_url){

document.getElementById("avatarImg").src=data.avatar_url

}

}

client.auth.getSession().then(({data})=>{

if(data.session){

user=data.session.user
start()

}

})

</script>

</body>

</html>
