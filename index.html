<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Capital Moral</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#000;
color:#fff;
font-family:Arial;
text-align:center;
padding:40px;
}

input{
padding:10px;
border:none;
border-radius:6px;
margin:5px;
}

button{
padding:10px 16px;
border:none;
border-radius:6px;
background:white;
color:black;
cursor:pointer;
margin:5px;
}

button:hover{
opacity:0.8;
}

#avatar{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
background:#222;
margin-bottom:20px;
}

#feed{
max-width:400px;
margin:auto;
text-align:left;
margin-top:30px;
}

.item{
padding:10px;
border-bottom:1px solid #333;
display:flex;
justify-content:space-between;
}

</style>

</head>

<body>

<h1>Capital Moral</h1>

<div id="loginBox">

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">

<br>

<button onclick="login()">Entrar</button>
<button onclick="register()">Registrarse</button>

</div>

<div id="app" style="display:none">

<img id="avatar">

<h2 id="capital">0</h2>

<button onclick="addAction(10)">+10 buena acción</button>
<button onclick="addAction(-5)">-5 mala acción</button>

<br><br>

<input type="file" id="file">

<br>

<button onclick="uploadAvatar()">Subir avatar</button>

<br><br>

<button onclick="logout()">Cerrar sesión</button>

<div id="feed"></div>

</div>

<script>

const supabaseUrl="https://mlxcjgywjhtodcjjeiuv.supabase.co"
const supabaseKey="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1seGNqZ3l3amh0b2RjamplaXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1Mzk1ODcsImV4cCI6MjA4ODExNTU4N30.fo-7m6lnBSODZYEwVFx0s7lRjNGIxqYmqY5I1Caxkdc"

const client=supabase.createClient(supabaseUrl,supabaseKey)

let user=null

async function register(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data,error}=await client.auth.signUp({
email:email,
password:password
})

if(error){
alert(error.message)
return
}

alert("Usuario creado")

}

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data,error}=await client.auth.signInWithPassword({
email:email,
password:password
})

if(error){
alert(error.message)
return
}

user=data.user

start()

}

async function logout(){

await client.auth.signOut()

location.reload()

}

async function start(){

document.getElementById("loginBox").style.display="none"
document.getElementById("app").style.display="block"

loadActions()
loadAvatar()

}

async function addAction(points){

await client
.from("actions")
.insert({
user_id:user.id,
points:points
})

loadActions()

}

async function loadActions(){

const {data}=await client
.from("actions")
.select("*")
.eq("user_id",user.id)
.order("created_at",{ascending:false})

let total=0

const feed=document.getElementById("feed")

feed.innerHTML=""

data.forEach(a=>{

total+=a.points

const div=document.createElement("div")

div.className="item"

div.innerHTML=`
<span>${a.points>0?"+":""}${a.points}</span>
<span>${new Date(a.created_at).toLocaleDateString()}</span>
`

feed.appendChild(div)

})

document.getElementById("capital").innerText=total

}

async function uploadAvatar(){

const file=document.getElementById("file").files[0]

if(!file)return

const filePath=user.id+".png"

await client.storage
.from("avatars")
.upload(filePath,file,{upsert:true})

const url= supabaseUrl + "/storage/v1/object/public/avatars/" + filePath

await client
.from("profiles")
.upsert({
id:user.id,
avatar_url:url
})

loadAvatar()

}

async function loadAvatar(){

const {data}=await client
.from("profiles")
.select("*")
.eq("id",user.id)
.single()

if(data && data.avatar_url){

document.getElementById("avatar").src=data.avatar_url

}

}

client.auth.getSession().then(({data})=>{

if(data.session){

user=data.session.user

start()

}

})

</script>

</body>
</html>
