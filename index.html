<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Capital Moral</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  background:#0f0f0f;
  color:#eaeaea;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}
.container{
  max-width:520px;
  margin:60px auto;
  padding:20px;
}
.card{
  background:#171717;
  padding:28px;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}
h1{
  margin:10px 0;
  font-size:42px;
  font-weight:600;
}
h2{
  margin:0;
  font-weight:500;
}
input,button{
  padding:10px;
  border:none;
  border-radius:8px;
  font-size:14px;
  width:100%;
}
input{
  background:#222;
  color:white;
}
button{
  background:#2c2c2c;
  color:white;
  cursor:pointer;
  transition:0.2s;
}
button:hover{
  background:#3a3a3a;
}
.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:15px;
}
.progress{
  height:6px;
  background:#222;
  border-radius:10px;
  margin-top:12px;
}
.progress-bar{
  height:6px;
  background:white;
  width:0%;
  border-radius:10px;
  transition:0.3s ease;
}
.small{
  font-size:12px;
  opacity:0.6;
}
.history{
  margin-top:20px;
  font-size:13px;
  max-height:260px;
  overflow-y:auto;
  padding-right:4px;
}
.entry{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px 0;
  border-bottom:1px solid #222;
}
.entry span{
  flex:1;
}
.entry input{
  width:60px;
  font-size:12px;
  padding:4px;
  text-align:center;
}
.delete{
  background:none;
  color:#888;
  font-size:12px;
  padding:4px;
  width:auto;
}
.delete:hover{
  color:white;
}
.streak{
  margin-top:8px;
  font-size:13px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="container">

<div class="card" id="loginBox">
<h2>Capital Moral</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Contraseña">
<button onclick="register()">Registrarse</button>
<button onclick="login()">Entrar</button>
</div>

<div class="card" id="app" style="display:none;">
<div id="userEmail" class="small"></div>
<h2 id="level"></h2>
<h1 id="points">0</h1>
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
<div class="streak">Racha: <span id="streak">0</span> días</div>

<div class="actions">
<button onclick="quickAdd('Ejercicio',20)">Ejercicio +20</button>
<button onclick="quickAdd('Lectura',15)">Lectura +15</button>
<button onclick="quickAdd('Meditación',25)">Meditación +25</button>
<button onclick="quickAdd('Ayuda',30)">Ayuda +30</button>
<button onclick="quickAdd('Estudio profundo',35)">Estudio +35</button>
<button onclick="quickAdd('Disciplina total',40)">Disciplina +40</button>
</div>

<input id="customName" placeholder="Acción personalizada">
<input id="customPoints" type="number" placeholder="Puntos">
<button onclick="customAdd()">Agregar acción</button>

<div class="history" id="history"></div>

<button onclick="logout()">Cerrar sesión</button>
</div>

</div>

<script>

const client = window.supabase.createClient(
"https://mlxcjgywjhtodcjjeiuv.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1seGNqZ3l3amh0b2RjamplaXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1Mzk1ODcsImV4cCI6MjA4ODExNTU4N30.fo-7m6lnBSODZYEwVFx0s7lRjNGIxqYmqY5I1Caxkdc"
);

let user=null;
let historyData=[];
let streak=0;
let lastAction=null;

const levels=[
{n:"Principiante",min:0,max:99},
{n:"Disciplinado",min:100,max:299},
{n:"Ejemplar",min:300,max:699},
{n:"Mentor",min:700,max:1499},
{n:"Leyenda",min:1500,max:999999}
];

function calcPoints(){
return historyData.reduce((sum,e)=>sum+e.puntos,0);
}

function updateTotalsOnly(){
let total=calcPoints();
document.getElementById("points").innerText=total;

let lvl=levels.find(l=>total>=l.min && total<=l.max);
document.getElementById("level").innerText=lvl.n;

let percent=((total-lvl.min)/(lvl.max-lvl.min))*100;
document.getElementById("progressBar").style.width=percent+"%";
}

function updateUI(){
updateTotalsOnly();
document.getElementById("streak").innerText=streak;
renderHistory();
}

function renderHistory(){
let container=document.getElementById("history");
container.innerHTML="";
historyData.slice().reverse().forEach(entry=>{
container.innerHTML+=`
<div class="entry">
<span>${entry.accion}</span>
<input type="number" value="${entry.puntos}" onchange="editPoints('${entry.id}',this.value)">
<button class="delete" onclick="deleteEntry('${entry.id}')">✕</button>
</div>`;
});
}

function checkStreak(){
let today=new Date().toISOString().split("T")[0];
if(!lastAction){ streak=1; }
else{
let yesterday=new Date();
yesterday.setDate(yesterday.getDate()-1);
yesterday=yesterday.toISOString().split("T")[0];
if(lastAction===today){}
else if(lastAction===yesterday){ streak++; }
else{ streak=1; }
}
lastAction=today;
}

function quickAdd(name,points){
checkStreak();
historyData.push({
id:crypto.randomUUID(),
accion:name,
puntos:points,
fecha:new Date().toISOString()
});
save(true);
}

function customAdd(){
let n=document.getElementById("customName").value;
let p=parseInt(document.getElementById("customPoints").value);
if(!n||!p) return;
quickAdd(n,p);
document.getElementById("customName").value="";
document.getElementById("customPoints").value="";
}

function editPoints(id,newValue){
let entry=historyData.find(e=>e.id===id);
entry.puntos=parseInt(newValue);
updateTotalsOnly();
save(false);
}

function deleteEntry(id){
historyData=historyData.filter(e=>e.id!==id);
save(true);
}

async function save(render=true){
await client.from("capital")
.update({
history:historyData,
streak:streak,
last_action:lastAction
})
.eq("user_id",user.id);
if(render) updateUI();
}

async function load(){
const {data}=await client.from("capital")
.select("*")
.eq("user_id",user.id)
.single();

if(!data){
await client.from("capital").insert({
user_id:user.id,
history:[],
streak:0
});
}else{
historyData=data.history||[];
streak=data.streak||0;
lastAction=data.last_action;
}
updateUI();
}

async function register(){
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;
await client.auth.signUp({email,password});
alert("Usuario creado");
}

async function login(){
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;
const {data,error}=await client.auth.signInWithPassword({email,password});
if(error){alert(error.message);return;}
user=data.user;
start();
}

async function start(){
document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("userEmail").innerText=user.email;
await load();
}

async function logout(){
await client.auth.signOut();
location.reload();
}

window.addEventListener("load", async ()=>{
const {data}=await client.auth.getSession();
if(data.session){
user=data.session.user;
start();
}
});

</script>
</body>
</html>
