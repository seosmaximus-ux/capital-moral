<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Capital Moral</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#0a0a0a;
color:white;
font-family:system-ui;
margin:0;
}

.container{
max-width:560px;
margin:auto;
padding:30px 20px;
}

h1{
font-size:30px;
letter-spacing:1px;
margin-bottom:20px;
}

.card{
background:#151515;
border-radius:16px;
padding:22px;
margin-bottom:18px;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#1f1f1f;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:white;
color:black;
font-weight:600;
cursor:pointer;
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:15px;
font-size:14px;
}

.logout{
background:#262626;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
overflow:hidden;
margin:auto;
background:#222;
display:flex;
align-items:center;
justify-content:center;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.points{
font-size:46px;
text-align:center;
margin:10px 0;
font-weight:700;
}

.level{
text-align:center;
opacity:0.7;
font-size:14px;
}

.actions{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.actions button{
background:#222;
color:white;
}

.feed .item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #222;
font-size:14px;
}

.value{
width:60px;
text-align:center;
font-weight:600;
}

.pos{color:#35ff9a;}
.neg{color:#ff6262;}

.delete{
cursor:pointer;
opacity:0.6;
}

.rank{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #222;
}

</style>
</head>

<body>

<div class="container">

<h1>Capital Moral</h1>

<div id="loginBox" class="card">

<input id="username" placeholder="username">
<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">

<button onclick="login()">Entrar</button>
<button onclick="register()">Registrarse</button>

</div>

<div id="app" style="display:none">

<div class="card">

<div class="topbar">
<div id="userName"></div>
<div class="logout" onclick="logout()">Salir</div>
</div>

<div class="avatar">
<img id="avatarImg" src="">
</div>

<div class="points" id="capital">0</div>
<div class="level" id="level"></div>

<input type="file" id="file">
<button onclick="uploadAvatar()">Subir foto</button>

</div>

<div class="card">

<div class="actions">

<button onclick="addAction('Ayudé a alguien',10)">🤝 Ayudar +10</button>
<button onclick="addAction('Generosidad',8)">💝 Generoso +8</button>
<button onclick="addAction('Mentí',-5)">⚠️ Mentir -5</button>
<button onclick="addAction('Egoísmo',-8)">🧊 Egoísmo -8</button>

</div>

</div>

<div class="card">
<h3>Historial</h3>
<div id="feed"></div>
</div>

<div class="card">
<h3>Ranking</h3>
<div id="ranking"></div>
</div>

</div>

</div>

<script>

const supabaseUrl="https://mlxcjgywjhtodcjjeiuv.supabase.co"
const supabaseKey="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1seGNqZ3l3amh0b2RjamplaXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1Mzk1ODcsImV4cCI6MjA4ODExNTU4N30.fo-7m6lnBSODZYEwVFx0s7lRjNGIxqYmqY5I1Caxkdc"

const client=supabase.createClient(supabaseUrl,supabaseKey)

let user=null

async function register(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value
const username=document.getElementById("username").value

const {data,error}=await client.auth.signUp({email,password})

if(error){alert(error.message);return}

await client.from("profiles").insert({
id:data.user.id,
username
})

alert("Usuario creado")

}

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data,error}=await client.auth.signInWithPassword({email,password})

if(error){alert(error.message);return}

user=data.user
start()

}

async function logout(){
await client.auth.signOut()
location.reload()
}

async function start(){

document.getElementById("loginBox").style.display="none"
document.getElementById("app").style.display="block"

loadProfile()
loadAvatar()
loadActions()
loadRanking()

}

async function loadProfile(){

const {data}=await client
.from("profiles")
.select("*")
.eq("id",user.id)
.single()

document.getElementById("userName").innerText=data.username

}

async function uploadAvatar(){

const file=document.getElementById("file").files[0]
if(!file) return

const path=user.id+".jpg"

await client.storage
.from("avatars")
.upload(path,file,{upsert:true})

const {data}=client.storage
.from("avatars")
.getPublicUrl(path)

const url=data.publicUrl+"?t="+Date.now()

await client.from("profiles")
.update({avatar_url:url})
.eq("id",user.id)

document.getElementById("avatarImg").src=url

}

async function loadAvatar(){

const {data}=await client
.from("profiles")
.select("avatar_url")
.eq("id",user.id)
.single()

if(data && data.avatar_url){
document.getElementById("avatarImg").src=data.avatar_url
}

}

async function addAction(name,points){

await client
.from("actions")
.insert({user_id:user.id,name,points})

loadActions()

}

async function deleteAction(id){

await client
.from("actions")
.delete()
.eq("id",id)

loadActions()

}

async function loadActions(){

const {data}=await client
.from("actions")
.select("*")
.eq("user_id",user.id)
.order("created_at",{ascending:false})

let total=0

const feed=document.getElementById("feed")
feed.innerHTML=""

data.forEach(a=>{

total+=a.points

feed.innerHTML+=`
<div class="item">
<div>${a.name}</div>
<div class="value ${a.points>0?'pos':'neg'}">${a.points}</div>
<div class="delete" onclick="deleteAction('${a.id}')">❌</div>
</div>
`

})

document.getElementById("capital").innerText=total

}

async function loadRanking(){

const {data:actions}=await client
.from("actions")
.select("user_id,points")

const {data:profiles}=await client
.from("profiles")
.select("id,username")

let totals={}

actions.forEach(a=>{
totals[a.user_id]=(totals[a.user_id]||0)+a.points
})

let ranking=[]

profiles.forEach(p=>{
ranking.push({
user:p.username,
points:totals[p.id]||0
})
})

ranking.sort((a,b)=>b.points-a.points)

const box=document.getElementById("ranking")
box.innerHTML=""

ranking.slice(0,10).forEach((r,i)=>{

box.innerHTML+=`
<div class="rank">
<div>#${i+1} ${r.user}</div>
<div>${r.points}</div>
</div>
`

})

}

client.auth.getSession().then(({data})=>{
if(data.session){
user=data.session.user
start()
}
})

</script>

</body>
</html>
