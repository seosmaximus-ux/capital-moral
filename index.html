<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cyborg 2.0</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0d0d0d;
color:white;
}

.container{
padding:20px;
max-width:500px;
margin:auto;
}

button{
background:#1f1f1f;
border:none;
color:white;
padding:10px;
border-radius:8px;
cursor:pointer;
}

button:hover{background:#2a2a2a;}

input{
background:#1a1a1a;
border:none;
color:white;
padding:8px;
border-radius:6px;
}

.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#111;
border-top:1px solid #222;
}

.nav button{
flex:1;
border-radius:0;
background:none;
padding:15px;
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
background:#222;
background-size:cover;
background-position:center;
}

.actionRow{
display:grid;
grid-template-columns: 1fr 70px 30px;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.pointsInput{
width:60px;
text-align:center;
}

.small{
font-size:12px;
opacity:0.6;
margin-top:5px;
}
</style>
</head>

<body>

<div class="container">
<div id="content"></div>
</div>

<div class="nav">
<button onclick="goHome()">Inicio</button>
<button onclick="goToday()">Mi Día</button>
<button onclick="goProfile()">Perfil</button>
</div>

<script>

const supabaseUrl="https://mlxcjgywjhtodcjjeiuv.supabase.co";
const supabaseKey="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1seGNqZ3l3amh0b2RjamplaXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1Mzk1ODcsImV4cCI6MjA4ODExNTU4N30.fo-7m6lnBSODZYEwVFx0s7lRjNGIxqYmqY5I1Caxkdc";
const client=supabase.createClient(supabaseUrl,supabaseKey);

let user=null;

/* ---------- AUTH ---------- */

async function init(){
const {data}=await client.auth.getUser();
if(data.user){
user=data.user;
goHome();
}else{
showAuth();
}
}

function showAuth(){
document.getElementById("content").innerHTML=`
<h2>Login</h2>
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button onclick="login()">Entrar</button>
<p id="authMsg"></p>
`;
}

async function login(){
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

const {error}=await client.auth.signInWithPassword({email,password});

if(error){
document.getElementById("authMsg").innerText=error.message;
}else{
location.reload();
}
}

/* ---------- NAVEGACION ---------- */

function goHome(){
loadFeed();
}

function goToday(){
loadToday();
}

function goProfile(){
loadProfile();
}

/* ---------- HOME ---------- */

async function loadFeed(){
const {data}=await client.from("actions")
.select("*,profiles(username,avatar_url)")
.order("created_at",{ascending:false})
.limit(20);

let html="<h2>Feed</h2>";

if(data){
data.forEach(a=>{
html+=`
<div style="margin-bottom:15px;">
<strong>${a.profiles?.username || "Usuario"}</strong>
<br>${a.name} +${a.points}
</div>
`;
});
}

document.getElementById("content").innerHTML=html;
}

/* ---------- PROFILE ---------- */

async function loadProfile(){

const {data}=await client.from("profiles")
.select("*")
.eq("id",user.id)
.single();

let html=`
<h2>Perfil</h2>

<div style="display:flex;gap:20px;align-items:center;margin-bottom:20px;">
<div class="avatar" id="avatarPreview"
style="background-image:url('${data.avatar_url || ""}')"></div>

<div>
<input type="file" id="avatarInput"><br><br>
<button onclick="uploadAvatar()">Subir imagen</button>
</div>
</div>

<h3>${data.username || "Sin nombre"}</h3>

<input id="usernameInput" placeholder="Nuevo nombre"><br><br>
<button onclick="updateUsername()">Guardar nombre</button>

<p id="profileMsg" class="small"></p>
`;

document.getElementById("content").innerHTML=html;
}

async function uploadAvatar(){
let file=document.getElementById("avatarInput").files[0];
if(!file) return;

let path=user.id+".png";

await client.storage.from("avatars")
.upload(path,file,{upsert:true});

let {data}=client.storage.from("avatars")
.getPublicUrl(path);

await client.from("profiles")
.update({avatar_url:data.publicUrl})
.eq("id",user.id);

document.getElementById("avatarPreview")
.style.backgroundImage=`url('${data.publicUrl}?t=${new Date().getTime()}')`;

document.getElementById("profileMsg").innerText="Imagen actualizada correctamente";
}

async function updateUsername(){
let value=document.getElementById("usernameInput").value;
if(!value) return;

await client.from("profiles")
.update({username:value})
.eq("id",user.id);

document.getElementById("profileMsg").innerText="Nombre actualizado";
document.getElementById("usernameInput").value="";
loadProfile();
}

/* ---------- MI DIA ---------- */

async function loadToday(){

let today=new Date().toISOString().split("T")[0];

const {data}=await client.from("actions")
.select("*")
.eq("user_id",user.id)
.gte("created_at",today)
.order("created_at",{ascending:false});

let html="<h2>Mi Día</h2>";

html+=`
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">
<button onclick="addAction('Ejercicio',20)">Ejercicio +20</button>
<button onclick="addAction('Lectura',15)">Lectura +15</button>
<button onclick="addAction('Disciplina',25)">Disciplina +25</button>
<button onclick="addAction('Ayuda',30)">Ayuda +30</button>
</div>
`;

if(data){
data.forEach(a=>{
html+=`
<div class="actionRow">
<div>${a.name}</div>
<input class="pointsInput" type="number" value="${a.points}"
onchange="editAction('${a.id}',this.value)">
<div style="cursor:pointer;" onclick="deleteAction('${a.id}')">✕</div>
</div>
`;
});
}

document.getElementById("content").innerHTML=html;
}

async function addAction(name,points){
await client.from("actions")
.insert({user_id:user.id,name,points});
loadToday();
}

async function editAction(id,value){
await client.from("actions")
.update({points:parseInt(value)})
.eq("id",id);
}

async function deleteAction(id){
await client.from("actions")
.delete()
.eq("id",id);
loadToday();
}

/* ---------- INIT ---------- */

init();

</script>

</body>
</html>
