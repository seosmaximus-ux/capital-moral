<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Capital Moral</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{
  margin:0;
  background:#0f0f0f;
  color:#eaeaea;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}
.container{
  max-width:500px;
  margin:60px auto;
  padding:20px;
}
.card{
  background:#171717;
  padding:25px;
  border-radius:12px;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
}
input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  font-size:14px;
}
input{
  background:#222;
  color:white;
}
button{
  background:#2c2c2c;
  color:white;
  cursor:pointer;
  transition:0.2s;
}
button:hover{
  background:#3a3a3a;
}
.progress{
  height:8px;
  background:#222;
  border-radius:10px;
  margin-top:10px;
}
.progress-bar{
  height:8px;
  background:white;
  width:0%;
  border-radius:10px;
  transition:0.4s;
}
.small{
  font-size:12px;
  opacity:0.6;
}
.history{
  margin-top:20px;
  font-size:13px;
  max-height:150px;
  overflow:auto;
}
.entry{
  border-bottom:1px solid #222;
  padding:6px 0;
  display:flex;
  justify-content:space-between;
}
.entry span{
  cursor:pointer;
}
.entry button{
  width:auto;
  padding:4px 8px;
  font-size:11px;
}
</style>
</head>
<body>

<div class="container">

<div class="card" id="loginBox">
<h2>Capital Moral</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Contraseña">
<button onclick="register()">Registrarse</button>
<button onclick="login()">Entrar</button>
</div>

<div class="card" id="app" style="display:none;">
<div id="userEmail" class="small"></div>
<h2 id="level"></h2>
<h1 id="points">0</h1>
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>

<button onclick="quickAdd('Ejercicio',20)">Ejercicio +20</button>
<button onclick="quickAdd('Lectura',15)">Lectura +15</button>

<input id="customName" placeholder="Acción personalizada">
<input id="customPoints" type="number" placeholder="Puntos">
<button onclick="customAdd()">Agregar acción</button>

<div class="history" id="history"></div>

<button onclick="logout()">Cerrar sesión</button>
</div>

</div>

<script>

const client = window.supabase.createClient(
"https://mlxcjgywjhtodcjjeiuv.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1seGNqZ3l3amh0b2RjamplaXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1Mzk1ODcsImV4cCI6MjA4ODExNTU4N30.fo-7m6lnBSODZYEwVFx0s7lRjNGIxqYmqY5I1Caxkdc"
);

let user=null;
let historyData=[];

const levels=[
{n:"Principiante",min:0,max:99},
{n:"Disciplinado",min:100,max:299},
{n:"Ejemplar",min:300,max:699},
{n:"Mentor",min:700,max:1499},
{n:"Leyenda",min:1500,max:999999}
];

function calcPoints(){
return historyData.reduce((sum,e)=>sum+e.puntos,0);
}

function updateUI(){
let total=calcPoints();
document.getElementById("points").innerText=total;

let lvl=levels.find(l=>total>=l.min && total<=l.max);
document.getElementById("level").innerText=lvl.n;

let percent=((total-lvl.min)/(lvl.max-lvl.min))*100;
document.getElementById("progressBar").style.width=percent+"%";

renderHistory();
}

function renderHistory(){
let container=document.getElementById("history");
container.innerHTML="";
historyData.slice().reverse().forEach(entry=>{
container.innerHTML+=`
<div class="entry">
<span onclick="editEntry('${entry.id}')">${entry.accion} +${entry.puntos}</span>
<button onclick="deleteEntry('${entry.id}')">X</button>
</div>`;
});
}

function quickAdd(name,points){
historyData.push({
id:crypto.randomUUID(),
accion:name,
puntos:points,
fecha:new Date().toISOString()
});
save();
}

function customAdd(){
let n=document.getElementById("customName").value;
let p=parseInt(document.getElementById("customPoints").value);
if(!n||!p) return;
quickAdd(n,p);
document.getElementById("customName").value="";
document.getElementById("customPoints").value="";
}

function deleteEntry(id){
historyData=historyData.filter(e=>e.id!==id);
save();
}

function editEntry(id){
let entry=historyData.find(e=>e.id===id);
let newPoints=parseInt(prompt("Modificar puntos:",entry.puntos));
if(!isNaN(newPoints)){
entry.puntos=newPoints;
save();
}
}

async function save(){
await client.from("capital")
.update({history:historyData})
.eq("user_id",user.id);
updateUI();
}

async function load(){
const {data}=await client.from("capital")
.select("*")
.eq("user_id",user.id)
.single();

if(!data){
await client.from("capital").insert({user_id:user.id,history:[]});
historyData=[];
}else{
historyData=data.history||[];
}
updateUI();
}

async function register(){
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;
await client.auth.signUp({email,password});
alert("Usuario creado");
}

async function login(){
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;
const {data,error}=await client.auth.signInWithPassword({email,password});
if(error){alert(error.message);return;}
user=data.user;
start();
}

async function start(){
document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("userEmail").innerText=user.email;
await load();
}

async function logout(){
await client.auth.signOut();
location.reload();
}

/* 🔥 RESTAURAR SESIÓN AUTOMÁTICAMENTE */
window.addEventListener("load", async ()=>{
const {data}=await client.auth.getSession();
if(data.session){
user=data.session.user;
start();
}
});

</script>
</body>
</html>
