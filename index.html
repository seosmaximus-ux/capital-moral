<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Capital Moral</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{
  margin:0;
  background:#0f0f0f;
  color:#eaeaea;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}
.container{
  max-width:520px;
  margin:60px auto;
  padding:20px;
}
.card{
  background:#171717;
  padding:25px;
  border-radius:14px;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
.profile{
  display:flex;
  align-items:center;
  gap:12px;
}
.avatar{
  width:50px;
  height:50px;
  border-radius:50%;
  background:#222;
  background-size:cover;
  background-position:center;
}
.username{
  font-size:14px;
  font-weight:600;
}
input,button{
  padding:10px;
  border:none;
  border-radius:8px;
  font-size:14px;
}
input{
  background:#222;
  color:white;
  width:100%;
  margin-top:10px;
}
button{
  background:#2c2c2c;
  color:white;
  cursor:pointer;
  transition:0.2s;
}
button:hover{ background:#3a3a3a; }
.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:20px;
}
.progress{
  height:8px;
  background:#222;
  border-radius:10px;
  margin-top:10px;
}
.progress-bar{
  height:8px;
  background:white;
  width:0%;
  border-radius:10px;
  transition:0.4s;
}
.entry{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #222;
  padding:6px 0;
  font-size:13px;
}
.entry input{
  width:60px;
  background:#111;
  text-align:center;
  padding:4px;
  font-size:12px;
}
.delete{
  font-size:11px;
  opacity:0.5;
  cursor:pointer;
}
.delete:hover{ opacity:1; }
.small{ font-size:12px; opacity:0.6; }
</style>
</head>
<body>

<div class="container">

<div class="card" id="loginBox">
<h2>Capital Moral</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Contraseña">
<button onclick="register()">Registrarse</button>
<button onclick="login()">Entrar</button>
</div>

<div class="card" id="app" style="display:none;">

<div class="topbar">
<div class="profile">
<div class="avatar" id="avatar"></div>
<div>
<div class="username" id="usernameDisplay"></div>
<div class="small" id="level"></div>
</div>
</div>
<button onclick="logout()">Cerrar</button>
</div>

<h1 id="points">0</h1>
<div class="progress"><div class="progress-bar" id="bar"></div></div>

<div class="actions">
<button onclick="addAction('Ejercicio',20)">Ejercicio +20</button>
<button onclick="addAction('Lectura',15)">Lectura +15</button>
<button onclick="addAction('Disciplina',25)">Disciplina +25</button>
<button onclick="addAction('Ayuda',30)">Ayuda +30</button>
</div>

<input id="customName" placeholder="Acción personalizada">
<input id="customPoints" type="number" placeholder="Puntos">
<button onclick="customAdd()">Agregar acción</button>

<input id="newUsername" placeholder="Cambiar nombre de usuario">
<input id="newAvatar" placeholder="URL imagen perfil">
<button onclick="updateProfile()">Actualizar perfil</button>

<div id="history"></div>

</div>
</div>

<script>

const client = window.supabase.createClient(
"https://mlxcjgywjhtodcjjeiuv.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1seGNqZ3l3amh0b2RjamplaXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1Mzk1ODcsImV4cCI6MjA4ODExNTU4N30.fo-7m6lnBSODZYEwVFx0s7lRjNGIxqYmqY5I1Caxkdc"
);

let user=null;
let historyData=[];
let username="";
let avatar="";

const levels=[
{n:"Principiante",min:0,max:99},
{n:"Disciplinado",min:100,max:299},
{n:"Ejemplar",min:300,max:699},
{n:"Mentor",min:700,max:1499},
{n:"Leyenda",min:1500,max:999999}
];

function calcPoints(){
return historyData.reduce((sum,e)=>sum+e.puntos,0);
}

function updateUI(){
let total=calcPoints();
document.getElementById("points").innerText=total;

let lvl=levels.find(l=>total>=l.min && total<=l.max);
document.getElementById("level").innerText=lvl.n;

let percent=((total-lvl.min)/(lvl.max-lvl.min))*100;
document.getElementById("bar").style.width=percent+"%";

document.getElementById("usernameDisplay").innerText=username||user.email;
document.getElementById("avatar").style.backgroundImage=avatar?`url(${avatar})`:"none";

renderHistory();
}

function renderHistory(){
let div=document.getElementById("history");
div.innerHTML="";
historyData.slice().reverse().forEach(e=>{
div.innerHTML+=`
<div class="entry">
<span>${e.accion}</span>
<input type="number" value="${e.puntos}" onchange="editPoints('${e.id}',this.value)">
<span class="delete" onclick="deleteEntry('${e.id}')">x</span>
</div>`;
});
}

function addAction(name,points){
historyData.push({
id:crypto.randomUUID(),
accion:name,
puntos:points,
fecha:new Date().toISOString()
});
save();
}

function customAdd(){
let n=document.getElementById("customName").value;
let p=parseInt(document.getElementById("customPoints").value);
if(!n||!p)return;
addAction(n,p);
document.getElementById("customName").value="";
document.getElementById("customPoints").value="";
}

function editPoints(id,value){
let entry=historyData.find(e=>e.id===id);
entry.puntos=parseInt(value)||0;
save();
}

function deleteEntry(id){
historyData=historyData.filter(e=>e.id!==id);
save();
}

async function updateProfile(){
username=document.getElementById("newUsername").value||username;
avatar=document.getElementById("newAvatar").value||avatar;

await client.from("capital")
.update({username,avatar})
.eq("user_id",user.id);

updateUI();
}

async function save(){
await client.from("capital")
.update({history:historyData})
.eq("user_id",user.id);
updateUI();
}

async function load(){
const {data}=await client.from("capital")
.select("*")
.eq("user_id",user.id)
.single();

if(!data){
await client.from("capital").insert({
user_id:user.id,
history:[],
username:"",
avatar:""
});
historyData=[];
}else{
historyData=data.history||[];
username=data.username||"";
avatar=data.avatar||"";
}
updateUI();
}

async function register(){
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;
await client.auth.signUp({email,password});
alert("Usuario creado");
}

async function login(){
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;
const {data,error}=await client.auth.signInWithPassword({email,password});
if(error){alert(error.message);return;}
user=data.user;
start();
}

async function start(){
document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";
await load();
}

async function logout(){
await client.auth.signOut();
location.reload();
}

(async ()=>{
const { data } = await client.auth.getSession();
if(data.session){
user=data.session.user;
start();
}
})();

</script>
</body>
</html>
