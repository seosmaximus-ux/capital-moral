<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Capital Moral</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#0b0b0b;
color:white;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
margin:0;
}

.container{
max-width:520px;
margin:auto;
padding:30px 20px;
}

h1{
font-size:28px;
font-weight:600;
letter-spacing:1px;
margin-bottom:30px;
}

.card{
background:#151515;
border-radius:16px;
padding:24px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#1f1f1f;
color:white;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:white;
color:black;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
font-size:14px;
opacity:0.8;
}

.logout{
background:#2b2b2b;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
overflow:hidden;
margin:auto;
background:#222;
display:flex;
align-items:center;
justify-content:center;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.points{
font-size:46px;
font-weight:700;
text-align:center;
margin:15px 0;
}

.label{
text-align:center;
font-size:13px;
opacity:0.6;
}

.actions{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.actions button{
background:#222;
color:white;
font-weight:500;
}

.feed .item{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 0;
border-bottom:1px solid #222;
font-size:14px;
}

.name{
flex:1;
}

.value{
width:60px;
text-align:center;
font-weight:600;
}

.pos{
color:#3cff8a;
}

.neg{
color:#ff5b5b;
}

.delete{
background:#333;
padding:5px 8px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

</style>

</head>

<body>

<div class="container">

<h1>Capital Moral</h1>

<div id="loginBox" class="card">

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">

<button onclick="login()">Entrar</button>
<button onclick="register()">Registrarse</button>

</div>

<div id="app" style="display:none">

<div class="card">

<div class="topbar">
<div id="userEmail"></div>
<div class="logout" onclick="logout()">Salir</div>
</div>

<div class="avatar">
<img id="avatarImg" src="">
</div>

<div class="points" id="capital">0</div>
<div class="label">Capital Moral</div>

<input type="file" id="file">
<button onclick="uploadAvatar()">Actualizar avatar</button>

</div>

<div class="card">

<div class="actions">

<button onclick="addAction('Ayudé a alguien',10)">🤝 Ayudar</button>
<button onclick="addAction('Acto generoso',8)">💝 Generosidad</button>
<button onclick="addAction('Mentí',-5)">⚠️ Mentir</button>
<button onclick="addAction('Acto egoísta',-8)">🧊 Egoísmo</button>

</div>

</div>

<div class="card feed" id="feed"></div>

</div>

</div>

<script>

const supabaseUrl="https://mlxcjgywjhtodcjjeiuv.supabase.co"
const supabaseKey="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1seGNqZ3l3amh0b2RjamplaXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1Mzk1ODcsImV4cCI6MjA4ODExNTU4N30.fo-7m6lnBSODZYEwVFx0s7lRjNGIxqYmqY5I1Caxkdc"

const client=supabase.createClient(supabaseUrl,supabaseKey)

let user=null

async function register(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {error}=await client.auth.signUp({email,password})

if(error) alert(error.message)
else alert("Usuario creado")

}

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data,error}=await client.auth.signInWithPassword({email,password})

if(error){alert(error.message);return}

user=data.user
start()

}

async function logout(){

await client.auth.signOut()
location.reload()

}

async function start(){

document.getElementById("loginBox").style.display="none"
document.getElementById("app").style.display="block"

document.getElementById("userEmail").innerText=user.email

loadAvatar()
loadActions()

}

async function addAction(name,points){

await client
.from("actions")
.insert({user_id:user.id,name,points})

loadActions()

}

async function deleteAction(id){

await client
.from("actions")
.delete()
.eq("id",id)

loadActions()

}

async function loadActions(){

const {data}=await client
.from("actions")
.select("*")
.eq("user_id",user.id)
.order("created_at",{ascending:false})

let total=0

const feed=document.getElementById("feed")
feed.innerHTML=""

data.forEach(a=>{

total+=a.points

const div=document.createElement("div")
div.className="item"

div.innerHTML=`
<div class="name">${a.name}</div>
<div class="value ${a.points>0?'pos':'neg'}">${a.points>0?'+':''}${a.points}</div>
<div class="delete" onclick="deleteAction('${a.id}')">X</div>
`

feed.appendChild(div)

})

document.getElementById("capital").innerText=total

}

async function uploadAvatar(){

const file=document.getElementById("file").files[0]
if(!file)return

const path=user.id+".jpg"

await client.storage
.from("avatars")
.upload(path,file,{upsert:true})

const {data}=client.storage
.from("avatars")
.getPublicUrl(path)

const url=data.publicUrl+"?t="+Date.now()

await client
.from("profiles")
.upsert({id:user.id,avatar_url:url})

document.getElementById("avatarImg").src=url

}

async function loadAvatar(){

const {data}=await client
.from("profiles")
.select("avatar_url")
.eq("id",user.id)
.single()

if(data && data.avatar_url){

document.getElementById("avatarImg").src=data.avatar_url

}

}

client.auth.getSession().then(({data})=>{

if(data.session){

user=data.session.user
start()

}

})

</script>

</body>

</html>
