```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cyborg Dashboard</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
margin:0;
}

.container{
width:380px;
margin-top:40px;
text-align:center;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
overflow:hidden;
border:2px solid #333;
margin:auto;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

input[type=file]{
margin-top:10px;
color:white;
}

.actions{
margin-top:25px;
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

button{
background:#111;
border:1px solid #444;
color:white;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#222;
}

.history{
margin-top:30px;
text-align:left;
width:100%;
}

.history h3{
border-bottom:1px solid #333;
padding-bottom:5px;
}

.log{
font-size:14px;
margin:6px 0;
color:#aaa;
}

</style>
</head>

<body>

<div class="container">

<div class="avatar">
<img id="avatarImg">
</div>

<input type="file" id="upload">

<div class="actions">

<button onclick="addAction('Entrenar')">Entrenar</button>
<button onclick="addAction('Leer')">Leer</button>
<button onclick="addAction('Meditar')">Meditar</button>
<button onclick="addAction('Dormir')">Dormir</button>

</div>

<div class="history">

<h3>Historial</h3>

<div id="logs"></div>

</div>

</div>

<script>

const avatar = document.getElementById("avatarImg")
const upload = document.getElementById("upload")
const logs = document.getElementById("logs")

// cargar avatar guardado
const savedAvatar = localStorage.getItem("avatar")

if(savedAvatar){
avatar.src = savedAvatar
}

// subir avatar
upload.addEventListener("change",function(){

const file = this.files[0]

const reader = new FileReader()

reader.onload = function(){

avatar.src = reader.result
localStorage.setItem("avatar",reader.result)

}

reader.readAsDataURL(file)

})

// cargar historial
let history = JSON.parse(localStorage.getItem("history")) || []

function renderHistory(){

logs.innerHTML=""

history.slice().reverse().forEach(item=>{

const div = document.createElement("div")

div.className="log"

div.innerText=item

logs.appendChild(div)

})

}

renderHistory()

function addAction(action){

const time = new Date().toLocaleString()

const entry = action+" — "+time

history.push(entry)

localStorage.setItem("history",JSON.stringify(history))

renderHistory()

}

</script>

</body>
</html>
