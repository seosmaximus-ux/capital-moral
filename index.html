<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capital Moral - V2</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --primary: #00ff88; --bg: #0a0a0a; --card: #161616; --gold: #ffcc00; }
    body { font-family: 'Inter', system-ui; background: var(--bg); color: #fff; margin: 0; padding-bottom: 100px; }
    .container { max-width: 450px; margin: auto; padding: 20px; }
    .card { background: var(--card); padding: 20px; margin: 15px 0; border-radius: 20px; border: 1px solid #222; }
    
    /* Botones y UI */
    .btn-main { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 12px; font-weight: 800; cursor: pointer; color: #000; margin-top: 10px; }
    .btn-edit { background: #333; color: #fff; border: 1px solid #555; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 11px; }
    
    /* Donación Estilo Premium */
    .donar-box { background: linear-gradient(135deg, #2b2300 0%, #0a0a0a 100%); border: 1px solid var(--gold); padding: 30px; border-radius: 25px; text-align: center; }
    
    .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #111; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #333; }
    .nav-btn { background: none; border: none; color: #888; font-weight: bold; cursor: pointer; }
    .nav-btn.active { color: var(--primary); }
  </style>
</head>
<body>

<div class="container">
  <h1 style="text-align: center;">Capital Moral</h1>

  <div id="tab-perfil" class="tab-content">
    <div class="card">
      <h2 id="puntosTotales" style="margin:0">0 pts</h2>
      <p style="opacity:0.6">Mi impacto validado</p>
    </div>
    <div class="card">
      <h4>Mis publicaciones</h4>
      <div id="miHistorial">Cargando...</div>
    </div>
  </div>

  <div id="tab-comunidad" class="tab-content" style="display:none">
    <h3 style="text-align:center">Muro de Transparencia</h3>
    <div id="feedComunidad"></div>
  </div>

  <div id="tab-donar" class="tab-content" style="display:none">
    <div class="donar-box">
      <small style="color:var(--gold)">FONDO COMUNITARIO</small>
      <h1 id="fondoGlobal" style="font-size: 40px; margin: 10px 0;">$0.00</h1>
      <input type="number" id="montoDonar" style="padding:10px; border-radius:10px; border:none; width:80%; text-align:center" placeholder="Ingresa monto...">
      <button class="btn-main" style="background:var(--gold)" onclick="realizarDonacion()">CONTRIBUIR</button>
    </div>
  </div>
</div>

<nav class="nav-bar">
  <button class="nav-btn active" onclick="switchTab('perfil')">PERFIL</button>
  <button class="nav-btn" onclick="switchTab('comunidad')">MURO</button>
  <button class="nav-btn" onclick="switchTab('donar')">DONAR</button>
</nav>

<script>
const _supabase = supabase.createClient("https://dmlajgddeyfvwahswlvh.supabase.co", "sb_publishable_gsI_j5ddQSWeclCq_RT2cg_nib8UwRX");

function switchTab(t) {
  document.querySelectorAll('.tab-content').forEach(e => e.style.display = 'none');
  document.getElementById('tab-'+t).style.display = 'block';
  if(t === 'perfil') actualizarPerfil();
  if(t === 'comunidad') cargarMuro();
}

async function cargarMuro() {
  const { data: { user } } = await _supabase.auth.getUser();
  const { data: acciones } = await _supabase.from('acciones').select('*');
  const feed = document.getElementById("feedComunidad");
  feed.innerHTML = "";
  
  acciones.forEach(act => {
    const esMio = user && act.usuario_id === user.id;
    feed.innerHTML += `
      <div class="card">
        <p>${act.nombre_ayudado}</p>
        ${esMio ? `<button class="btn-edit" onclick="alert('Edición activa para ID: ${act.id}')">EDITAR</button>` : ''}
      </div>`;
  });
}

async function actualizarPerfil() {
  const { data: { user } } = await _supabase.auth.getUser();
  const { data: hist } = await _supabase.from('acciones').select('*').eq('usuario_id', user.id);
  const cont = document.getElementById("miHistorial");
  cont.innerHTML = "";
  hist?.forEach(i => {
    cont.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between">
      ${i.nombre_ayudado} <button class="btn-edit" onclick="editar('${i.id}')">EDITAR</button>
    </div>`;
  });
}

function editar(id) { alert("Abrir modal para editar: " + id); }
async function realizarDonacion() { alert("Donación procesada."); }

// Inicializar
_supabase.auth.getUser().then(u => { if(u.data.user) switchTab('perfil'); });
</script>
</body>
</html>
