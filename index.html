<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capital Moral - Sistema de Rangos</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --primary: #00ff88; --bg: #0a0a0a; --card: #161616; --text: #f0f0f0; --gold: #ffcc00; --pending: #ff4444; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
    .container { max-width: 480px; margin: auto; padding: 20px; }
    .card { background: var(--card); padding: 20px; margin: 15px 0; border-radius: 20px; border: 1px solid #222; position: relative; }
    
    /* Notificaciones */
    #notification-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; max-width: 400px; pointer-events: none; }
    .toast { background: #222; color: white; padding: 15px; border-radius: 12px; border-left: 5px solid var(--primary); margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-size: 13px; text-align: center; }

    /* Rangos */
    .rango-badge { font-size: 10px; padding: 3px 8px; border-radius: 5px; font-weight: bold; text-transform: uppercase; margin-left: 5px; }
    .rango-bronce { background: #cd7f32; color: white; }
    .rango-plata { background: #c0c0c0; color: black; }
    .rango-oro { background: var(--gold); color: black; box-shadow: 0 0 10px var(--gold); }

    /* Botones */
    .main-btn { width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 12px; font-weight: 800; cursor: pointer; color: #000; text-transform: uppercase; }
    .edit-btn { background: transparent; color: var(--primary); border: 1px solid var(--primary); padding: 5px 10px; border-radius: 8px; font-size: 11px; cursor: pointer; }
    .btn-validar { background: #222; border: 1px solid #444; color: white; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; }
    .btn-validar.active { background: var(--primary); color: #000; }

    /* Inputs */
    input, select, textarea { width: 100%; padding: 14px; border-radius: 12px; background: #1a1a1a; border: 1px solid #333; color: white; margin-bottom: 10px; box-sizing: border-box; }
    
    .status-tag { padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; border: 1px solid; }
    .status-pending { color: var(--pending); border-color: var(--pending); }
    .status-verified { color: var(--primary); border-color: var(--primary); }

    .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15,15,15,0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #222; }
    .nav-btn { background: none; border: none; color: #666; cursor: pointer; font-size: 11px; font-weight: bold; }
    .nav-btn.active { color: var(--primary); }
    .img-wall { width: 100%; border-radius: 15px; margin: 10px 0; aspect-ratio: 1/1; object-fit: cover; background: #222; }
    .hidden { display: none !important; }

    #editModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>

<div id="notification-container"></div>

<div id="editModal" class="hidden">
  <div class="card" style="width: 90%; max-width: 400px;">
    <h3>Editar Acción</h3>
    <input type="hidden" id="editId">
    <input type="text" id="editNombre" placeholder="Nombre">
    <textarea id="editComentario" placeholder="Descripción"></textarea>
    <button class="main-btn" onclick="guardarEdicion()">Guardar Cambios</button>
    <button class="edit-btn" onclick="document.getElementById('editModal').classList.add('hidden')" style="width:100%; margin-top:10px; color: white; border-color: #444;">Cancelar</button>
  </div>
</div>

<div class="container">
  <h1 style="text-align: center;">Capital <span style="color:var(--primary)">Moral</span></h1>

  <div id="authSection" class="card">
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button class="main-btn" onclick="signIn()">Entrar</button>
    <button style="background:none; border:none; color:#666; width:100%; margin-top:15px;" onclick="signUp()">Crear Cuenta</button>
  </div>

  <div id="tab-perfil" class="tab-content hidden">
    <div class="card" style="text-align: center; background: linear-gradient(180deg, #1a1a1a, #0a0a0a);">
      <div id="userRango"></div>
      <h2 id="puntosTotales" style="font-size: 50px; margin: 5px 0;">0</h2>
      <p id="valorEstimado" style="opacity: 0.7; font-size: 13px;">Impacto: $0.00</p>
    </div>

    <div class="card">
      <h4 style="margin-top:0;">Nueva Acción</h4>
      <input type="text" id="nombreAyudado" placeholder="¿A quién ayudaste?">
      <textarea id="comentarioAccion" placeholder="Descripción..."></textarea>
      <input type="file" id="fotoInput" accept="image/*">
      <button class="main-btn" id="btnRegistrar" onclick="registrarAccion()">Publicar</button>
    </div>

    <div class="card">
      <h4>Mis Acciones Recientes</h4>
      <div id="miHistorial">Cargando historial...</div>
    </div>
    <button onclick="signOut()" style="background:none; border:none; color:#444; width:100%;">Cerrar Sesión</button>
  </div>

  <div id="tab-comunidad" class="tab-content hidden">
    <h3 style="text-align: center;">Muro de Transparencia</h3>
    <div id="feedComunidad"></div>
  </div>

  <div id="tab-donar" class="tab-content hidden">
    <div class="card" style="text-align: center; border-color: var(--gold);">
      <h1 id="fondoGlobal">$0.00</h1>
      <input type="number" id="montoDonar" placeholder="Donar ($)">
      <button class="main-btn" style="background: var(--gold); color: black;" onclick="realizarDonacion()">CONTRIBUIR</button>
    </div>
  </div>
</div>

<nav id="navBar" class="nav-bar hidden">
  <button class="nav-btn active" onclick="showTab('perfil')">PERFIL</button>
  <button class="nav-btn" onclick="showTab('comunidad')">MURO</button>
  <button class="nav-btn" onclick="showTab('donar')">DONAR</button>
</nav>

<script>
const _supabase = supabase.createClient("https://dmlajgddeyfvwahswlvh.supabase.co", "sb_publishable_gsI_j5ddQSWeclCq_RT2cg_nib8UwRX");

function notify(msg) {
  const c = document.getElementById('notification-container');
  const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
  c.appendChild(t); setTimeout(() => t.remove(), 3000);
}

function getRango(puntos) {
  if (puntos >= 500) return '<span class="rango-badge rango-oro">Leyenda Oro</span>';
  if (puntos >= 200) return '<span class="rango-badge rango-plata">Héroe Plata</span>';
  return '<span class="rango-badge rango-bronce">Colaborador Bronce</span>';
}

function showTab(name) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.remove('hidden');
  if(event) event.currentTarget.classList.add('active');
  if(name === 'perfil') actualizarPerfil();
  if(name === 'comunidad') cargarMuro();
  if(name === 'donar') cargarFondo();
}

async function cargarMuro() {
  const feed = document.getElementById("feedComunidad");
  feed.innerHTML = "<p style='text-align:center;'>Actualizando muro...</p>";
  
  const { data: { user } } = await _supabase.auth.getUser();
  const { data: acciones } = await _supabase.from('acciones').select('*').order('created_at', { ascending: false });
  const { data: usuarios } = await _supabase.from('usuarios').select('id, email, capital_total');
  const { data: vals } = await _supabase.from('validaciones').select('*');

  feed.innerHTML = "";
  acciones?.forEach(act => {
    const autor = usuarios?.find(u => u.id === act.usuario_id);
    const email = autor ? autor.email.split('@')[0] : "Anónimo";
    const puntosAutor = autor ? autor.capital_total : 0;
    const votos = vals?.filter(v => v.accion_id === act.id) || [];
    const num = votos.length;
    const ya = user ? votos.some(v => v.usuario_id === user.id) : false;
    const esMio = user && act.usuario_id === user.id;

    feed.innerHTML += `
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items: center;">
          <div><strong>@${email}</strong> ${getRango(puntosAutor)}</div>
          <span class="status-tag ${num >= 3 ? 'status-verified' : 'status-pending'}">${num >= 3 ? 'VERIFICADO' : `${num}/3 Votos`}</span>
        </div>
        <p style="margin: 10px 0;"><b>${act.nombre_ayudado}</b>: ${act.comentario}</p>
        <img src="${act.foto_url}" class="img-wall">
        
        <div style="display:flex; gap:10px;">
          ${esMio && num < 3 ? `<button class="edit-btn" onclick="abrirEditor(${act.id}, '${act.nombre_ayudado}', '${act.comentario}')">EDITAR MI POST</button>` : ''}
          <button class="btn-validar ${ya ? 'active' : ''}" ${(ya || esMio || num >= 3) ? 'disabled' : ''} onclick="validar(${act.id}, ${act.puntos}, '${act.usuario_id}')">
            ${ya ? 'YA VALIDASTE' : esMio ? 'ES TUYO' : num >= 3 ? 'TERMINADO' : 'VALIDAR ✅'}
          </button>
        </div>
      </div>`;
  });
}

async function validar(id, pts, autorId) {
  const { data: { user } } = await _supabase.auth.getUser();
  await _supabase.from('validaciones').insert([{ accion_id: id, usuario_id: user.id }]);
  const { data: votos } = await _supabase.from('validaciones').select('id').eq('accion_id', id);
  if(votos.length === 3) {
    const { data: a } = await _supabase.from('usuarios').select('capital_total').eq('id', autorId).single();
    await _supabase.from('usuarios').update({ capital_total: (a.capital_total || 0) + pts }).eq('id', autorId);
    notify("¡Puntos otorgados al autor!");
  }
  cargarMuro();
}

async function registrarAccion() {
  const btn = document.getElementById("btnRegistrar");
  const nom = document.getElementById("nombreAyudado").value;
  const file = document.getElementById("fotoInput").files[0];
  if(!nom || !file) return notify("Falta nombre o foto");
  btn.innerText = "SUBIENDO..."; btn.disabled = true;
  const { data: { user } } = await _supabase.auth.getUser();
  const path = `${user.id}/${Date.now()}.jpg`;
  await _supabase.storage.from('pruebas').upload(path, file);
  const { data: { publicUrl } } = _supabase.storage.from('pruebas').getPublicUrl(path);
  await _supabase.from('acciones').insert([{ usuario_id: user.id, nombre_ayudado: nom, comentario: document.getElementById("comentarioAccion").value, foto_url: publicUrl, puntos: 50 }]);
  notify("¡Publicado! Revisa el muro.");
  location.reload();
}

async function actualizarPerfil() {
  const { data: { user } } = await _supabase.auth.getUser();
  if(!user) return;
  const { data: u } = await _supabase.from('usuarios').select('*').eq('id', user.id).single();
  const { data: f } = await _supabase.from('fondo_comunitario').select('*').eq('id', 1).single();
  
  document.getElementById("userRango").innerHTML = getRango(u?.capital_total || 0);
  document.getElementById("puntosTotales").innerText = u?.capital_total || 0;
  document.getElementById("valorEstimado").innerText = "Impacto: $" + ((u?.capital_total || 0) * 0.1).toFixed(2);
  document.getElementById("fondoGlobal").innerText = "$" + (f?.monto_total || 0);

  const { data: hist } = await _supabase.from('acciones').select('*').eq('usuario_id', user.id).order('created_at', { ascending: false });
  const { data: allVals } = await _supabase.from('validaciones').select('*');
  
  const cont = document.getElementById("miHistorial");
  if(!hist || hist.length === 0) {
    cont.innerHTML = "<p style='font-size:12px; opacity:0.5;'>No has publicado nada aún.</p>";
    return;
  }

  cont.innerHTML = "";
  hist.forEach(i => {
    const numVotos = allVals ? allVals.filter(v => v.accion_id === i.id).length : 0;
    cont.innerHTML += `
      <div style="padding:10px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center;">
        <div style="max-width: 70%;">
          <strong style="font-size:13px;">${i.nombre_ayudado}</strong><br>
          <small style="opacity:0.6;">${numVotos}/3 validaciones</small>
        </div>
        ${numVotos < 3 ? `<button class="edit-btn" onclick="abrirEditor(${i.id}, '${i.nombre_ayudado}', '${i.comentario}')">Editar</button>` : '<b style="color:var(--primary); font-size:10px;">LISTO</b>'}
      </div>`;
  });
}

function abrirEditor(id, nombre, comentario) {
  document.getElementById('editId').value = id;
  document.getElementById('editNombre').value = nombre;
  document.getElementById('editComentario').value = comentario;
  document.getElementById('editModal').classList.remove('hidden');
}

async function guardarEdicion() {
  const id = document.getElementById('editId').value;
  const nom = document.getElementById('editNombre').value;
  const com = document.getElementById('editComentario').value;
  await _supabase.from('acciones').update({ nombre_ayudado: nom, comentario: com }).eq('id', id);
  notify("Cambios guardados");
  document.getElementById('editModal').classList.add('hidden');
  actualizarPerfil();
  cargarMuro();
}

async function cargarFondo() {
  const { data } = await _supabase.from('fondo_comunitario').select('*').eq('id', 1).single();
  document.getElementById("fondoGlobal").innerText = "$" + (data?.monto_total || 0);
}

async function realizarDonacion() {
  const m = parseFloat(document.getElementById("montoDonar").value);
  if(!m) return;
  const { data } = await _supabase.from('fondo_comunitario').select('*').eq('id', 1).single();
  await _supabase.from('fondo_comunitario').update({ monto_total: (data.monto_total || 0) + m }).eq('id', 1);
  notify("¡Gracias por tu aporte!");
  cargarFondo();
}

async function signIn() {
  const { error } = await _supabase.auth.signInWithPassword({ email: document.getElementById("email").value, password: document.getElementById("password").value });
  if (error) notify(error.message); else verificarSesion();
}

async function signUp() {
  const email = document.getElementById("email").value;
  const { data, error } = await _supabase.auth.signUp({ email, password: document.getElementById("password").value });
  if (data.user) {
    await _supabase.from('usuarios').insert([{ id: data.user.id, email, capital_total: 0 }]);
    notify("Cuenta creada. ¡Bienvenido!");
  } else notify(error.message);
}

async function signOut() { await _supabase.auth.signOut(); location.reload(); }

async function verificarSesion() {
  const { data: { user } } = await _supabase.auth.getUser();
  if (user) {
    document.getElementById("authSection").classList.add("hidden");
    document.getElementById("navBar").classList.remove("hidden");
    document.getElementById("tab-perfil").classList.remove("hidden");
    actualizarPerfil();
  }
}

verificarSesion();
</script>
</body>
</html>
