<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capital Moral</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0d0d0d;
  color:white;
  text-align:center;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

.card{
  background:#1a1a1a;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}

input, button, select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

button{
  background:#ffffff;
  color:black;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

button:hover{
  opacity:0.8;
}

.hidden{
  display:none;
}

#capital{
  font-size:40px;
  margin:10px 0;
}

.level-bar{
  background:#333;
  border-radius:10px;
  height:20px;
  overflow:hidden;
  margin-top:10px;
}

.level-fill{
  background:#00ff88;
  height:100%;
  width:0%;
  transition:0.5s ease;
}

.action-btn{
  background:#2a2a2a;
  color:white;
}

.action-btn:hover{
  background:#444;
}

.history{
  text-align:left;
  margin-top:15px;
  font-size:14px;
  max-height:150px;
  overflow:auto;
}
</style>
</head>

<body>

<div class="container">

<h1>Capital Moral</h1>

<div id="loginBox" class="card">
  <input type="email" id="email" placeholder="Tu email">
  <button onclick="login()">Iniciar sesión / Registrarse</button>
</div>

<div id="app" class="hidden">

  <div class="card">
    <div id="userEmail"></div>
    <h2>Mi Capital</h2>
    <div id="capital">0</div>
    <div>Nivel <span id="level">1</span></div>
    <div class="level-bar">
      <div class="level-fill" id="levelFill"></div>
    </div>
  </div>

  <div class="card">
    <h3>Registrar Acción</h3>

    <button class="action-btn" onclick="addPoints('Ayudé a alguien',10)">Ayudé a alguien (+10)</button>
    <button class="action-btn" onclick="addPoints('Me ejercité',8)">Me ejercité (+8)</button>
    <button class="action-btn" onclick="addPoints('Leí',6)">Leí (+6)</button>
    <button class="action-btn" onclick="addPoints('Cumplí mis calorías',5)">Cumplí mis calorías (+5)</button>
  </div>

  <div class="card">
    <h3>Historial</h3>
    <div class="history" id="history"></div>
  </div>

</div>
</div>

<script>

const supabase = window.supabase.createClient(
  "https://dmlajgddeyfvwahswlvh.supabase.co",
  "sb_publishable_gsI_j5ddQSWeclCq_RT2cg_nib8UwRX"
);

let user = null;
let capital = 0;
let historyList = [];

async function login(){
  const email = document.getElementById("email").value;

  const { data, error } = await supabase.auth.signInWithOtp({
    email: email
  });

  if(error){
    alert(error.message);
  } else {
    alert("Revisá tu email para confirmar.");
  }
}

supabase.auth.onAuthStateChange(async (event, session)=>{
  if(session){
    user = session.user;
    startApp();
  }
});

async function startApp(){
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("userEmail").innerText = user.email;

  await loadData();
}

async function loadData(){
  const { data, error } = await supabase
    .from("capital")
    .select("*")
    .eq("user_id", user.id)
    .single();

  if(data){
    capital = data.points;
    historyList = data.history || [];
  } else {
    await supabase.from("capital").insert({
      user_id: user.id,
      points:0,
      history:[]
    });
    capital = 0;
    historyList = [];
  }

  updateUI();
}

async function addPoints(action, points){
  capital += points;

  const entry = action + " +" + points + " (" + new Date().toLocaleDateString() + ")";
  historyList.unshift(entry);

  await supabase.from("capital")
  .update({
    points: capital,
    history: historyList
  })
  .eq("user_id", user.id);

  animateCapital();
  updateUI();
}

function updateUI(){
  document.getElementById("capital").innerText = capital;

  let level = Math.floor(capital / 100) + 1;
  let progress = capital % 100;

  document.getElementById("level").innerText = level;
  document.getElementById("levelFill").style.width = progress + "%";

  const historyDiv = document.getElementById("history");
  historyDiv.innerHTML = "";

  historyList.slice(0,20).forEach(item=>{
    historyDiv.innerHTML += "<div>"+item+"</div>";
  });
}

function animateCapital(){
  const el = document.getElementById("capital");
  el.style.transform = "scale(1.2)";
  setTimeout(()=>{
    el.style.transform = "scale(1)";
  },200);
}

</script>

</body>
</html>
