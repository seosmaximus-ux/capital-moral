<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Natural Fit</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
font-family: 'Inter', sans-serif;
background:#0f0f0f;
color:white;
margin:0;
display:flex;
justify-content:center;
}

.container{
width:380px;
max-width:95%;
padding:20px;
}

h1{
text-align:center;
font-weight:300;
letter-spacing:2px;
margin-bottom:30px;
}

.card{
background:#181818;
padding:20px;
border-radius:14px;
margin-bottom:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

.avatar-container{
display:flex;
justify-content:center;
margin-bottom:15px;
}

.avatar{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
border:3px solid #2a2a2a;
}

.username{
text-align:center;
font-size:18px;
margin-bottom:10px;
font-weight:500;
}

.points{
text-align:center;
font-size:28px;
font-weight:600;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#ffffff;
color:#000;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

button:hover{
opacity:0.85;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-bottom:10px;
}

.leaderboard-item{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #2a2a2a;
}

.rank-left{
display:flex;
align-items:center;
gap:10px;
}

.rank-avatar{
width:36px;
height:36px;
border-radius:50%;
object-fit:cover;
}

.rank-name{
font-weight:500;
}

.rank-points{
opacity:0.7;
}

.small{
font-size:13px;
opacity:0.6;
text-align:center;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>NATURAL FIT</h1>

<div class="card" id="loginCard">

<input id="usernameInput" placeholder="Nombre de usuario">
<button onclick="login()">Entrar</button>

</div>

<div class="card" id="profileCard" style="display:none">

<div class="avatar-container">
<img id="avatarImg" class="avatar">
</div>

<div class="username" id="username"></div>

<div class="points" id="points">0</div>

<button onclick="addPoint()">+1 punto</button>

<div class="small">Un punto por día</div>

</div>

<div class="card">

<h3>Ranking</h3>

<div id="leaderboard"></div>

</div>

</div>

<script>

const supabase = supabase.createClient(
"https://mlxcjgywjhtodcjjeiuv.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1seGNqZ3l3amh0b2RjamplaXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1Mzk1ODcsImV4cCI6MjA4ODExNTU4N30.fo-7m6lnBSODZYEwVFx0s7lRjNGIxqYmqY5I1Caxkdc"
)

let currentUser = null

async function login(){

const username = document.getElementById("usernameInput").value

if(!username) return

let { data } = await supabase
.from("profiles")
.select("*")
.eq("username", username)
.single()

if(!data){

let { data:newUser } = await supabase
.from("profiles")
.insert([{username:username,points:0}])
.select()
.single()

currentUser=newUser

}else{
currentUser=data
}

document.getElementById("loginCard").style.display="none"
document.getElementById("profileCard").style.display="block"

loadProfile()
loadLeaderboard()

}

function loadProfile(){

document.getElementById("username").innerText=currentUser.username
document.getElementById("points").innerText=currentUser.points

const avatar=document.getElementById("avatarImg")

if(currentUser.avatar_url){

avatar.src=currentUser.avatar_url

}else{

avatar.src="https://i.imgur.com/6VBx3io.png"

}

}

async function addPoint(){

let newPoints=currentUser.points+1

await supabase
.from("profiles")
.update({points:newPoints})
.eq("id",currentUser.id)

currentUser.points=newPoints

document.getElementById("points").innerText=newPoints

loadLeaderboard()

}

async function loadLeaderboard(){

let { data } = await supabase
.from("profiles")
.select("*")
.order("points",{ascending:false})
.limit(10)

const board=document.getElementById("leaderboard")

board.innerHTML=""

data.forEach((user,i)=>{

let avatar=user.avatar_url || "https://i.imgur.com/6VBx3io.png"

board.innerHTML+=`

<div class="leaderboard-item">

<div class="rank-left">

<div>#${i+1}</div>

<img src="${avatar}" class="rank-avatar">

<div class="rank-name">${user.username}</div>

</div>

<div class="rank-points">${user.points}</div>

</div>

`

})

}

loadLeaderboard()

</script>

</body>
</html>
